<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Cleaner</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

.topbar {
  padding: 15px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
  border-bottom: 1px solid #444;
}

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  gap: 4px;
  color: #ccc;
}

button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 10px 16px;
  cursor: pointer;
  transition: 0.15s;
}

button:hover {
  background: #5a5454;
}

.container {
  display: flex;
  height: calc(100vh - 70px);
}

.left {
  width: 30%;
  overflow-y: auto;
  background: #2b2626;
  border-right: 1px solid #444;
}

.right {
  width: 70%;
  padding: 12px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

.file {
  padding: 10px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
}

.file:hover {
  background: #3a3434;
}

.info {
  color: #aaa;
  font-size: 12px;
}

::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

::-webkit-scrollbar-track {
  background: #2a2525;
}

::-webkit-scrollbar-thumb {
  background: #555;
  border-radius: 8px;
}

::-webkit-scrollbar-thumb:hover {
  background: #666;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Upload Files / Folder
    <input type="file" id="files" webkitdirectory multiple>
  </label>

  <button onclick="processFiles()">Clean Files</button>

  <button onclick="downloadZip()">Download ZIP</button>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">No file selected.</div>
</div>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let cleanedFiles = {};

/* =========================
   PYTHON-LIKE CLEANER
========================= */
function cleanText(text) {

  // remove weird unicode garbage
  text = text.replace(/[^\x00-\x7F]+/g, " ");

  // keep readable chars
  text = text.replace(/[^\w\s\-.:/\\]/g, " ");

  // normalize whitespace
  text = text.replace(/\s+/g, "\n");

  let lines = [];

  for (let line of text.split("\n")) {

    line = line.trim();

    if (line.length < 3)
      continue;

    lines.push(line);
  }

  return lines.join("\n");
}

/* =========================
   ESCAPE HTML
========================= */
function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

/* =========================
   NORMALIZE PATH
========================= */
function normalize(file) {
  return (file.webkitRelativePath || file.name);
}

/* =========================
   PROCESS FILES
========================= */
async function processFiles() {

  cleanedFiles = {};

  const files = document.getElementById("files").files;
  const fileList = document.getElementById("fileList");
  const viewer = document.getElementById("viewer");

  fileList.innerHTML = "";
  viewer.textContent = "Processing...";

  for (let file of files) {

    const text = await file.text();

    const cleaned = cleanText(text);

    const path = normalize(file);

    cleanedFiles[path] = cleaned;

    const div = document.createElement("div");
    div.className = "file";

    div.innerHTML = `
      <div>${path}</div>
      <div class="info">${cleaned.length} chars</div>
    `;

    div.onclick = () => {
      viewer.textContent = cleaned;
    };

    fileList.appendChild(div);
  }

  viewer.textContent = "Finished cleaning files.";
}

/* =========================
   DOWNLOAD ZIP
========================= */
async function downloadZip() {

  const zip = new JSZip();

  for (const path in cleanedFiles) {

    let txtName = path;

    // force .txt extension
    if (!txtName.endsWith(".txt")) {
      txtName += ".txt";
    }

    zip.file(txtName, cleanedFiles[path]);
  }

  const blob = await zip.generateAsync({
    type: "blob"
  });

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "cleaned_files.zip";
  a.click();
}
</script>

</body>
</html>
