<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Data Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

/* TOP BAR */
.topbar {
  padding: 12px;
  display: flex;
  gap: 12px;
  background: #2a2525;
  position: sticky;
  top: 0;
}

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 10px 14px;
  cursor: pointer;
}

button:hover { background: #5a5454; }

.container {
  display: flex;
  height: calc(100vh - 60px);
}

/* LEFT FILE LIST */
.left {
  width: 30%;
  background: #2b2626;
  overflow-y: auto;
  border-right: 1px solid #444;
}

.file {
  padding: 8px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
}

.file:hover { background: #3a3434; }

.tag {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
}

.modified { background: #ef6c00; }
.added { background: #2e7d32; }
.unchanged { background: #555; }

/* RIGHT VIEWER */
.right {
  width: 70%;
  padding: 10px;
  overflow-y: auto;
}

/* 🔥 IMPORTANT: BLOCK SEPARATION */
.block {
  margin-bottom: 12px;
  padding: 8px;
  border-radius: 6px;
  background: #2a2525;
  white-space: pre-wrap;
  word-break: break-word;
}

/* ADD / REMOVE STYLES */
.add {
  background: rgba(46,125,50,0.25);
  border-left: 3px solid #2e7d32;
}

.remove {
  background: rgba(183,28,28,0.25);
  border-left: 3px solid #b71c1c;
  text-decoration: line-through;
  opacity: 0.85;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Compare</button>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select file</div>
</div>

<script>
let oldData = {};
let newData = {};

/* CLEAN */
function cleanText(t) {
  return t.replace(/[\u0000-\u001F\u007F-\u009F]/g, "").replace(/\r/g, "");
}

/* PATH */
function normalize(file) {
  return (file.webkitRelativePath || file.name).split("/").slice(1).join("/");
}

/* READ */
function readFiles(files, store, cb) {
  let done = 0;
  if (!files.length) return cb();

  for (let f of files) {
    const r = new FileReader();

    r.onload = e => {
      store[normalize(f)] = cleanText(e.target.result);
      done++;
      if (done === files.length) cb();
    };

    r.readAsText(f);
  }
}

/* LOAD */
function loadFiles() {
  oldData = {};
  newData = {};

  readFiles(oldFiles.files, oldData, () => {
    readFiles(newFiles.files, newData, compare);
  });
}

/* LIST */
function compare() {

  const list = document.getElementById("fileList");
  list.innerHTML = "";

  const all = new Set([...Object.keys(oldData), ...Object.keys(newData)]);

  all.forEach(name => {

    const o = oldData[name];
    const n = newData[name];

    let status = "unchanged";
    if (!o) status = "added";
    else if (!n) status = "removed";
    else if (o !== n) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.onclick = () => show(name);

    div.innerHTML = `
      <span>${name}</span>
      <span class="tag ${status}">${status}</span>
    `;

    list.appendChild(div);
  });
}

/* SPLIT INTO STRUCTURAL BLOCKS */
function splitBlocks(text) {
  return cleanText(text)
    .split(/(?=\/Game\/|InputAction\.|UI\.|BP_|Ability\.|require|ConsoleAutoChangeLine)/g)
    .filter(Boolean);
}

/* SHOW */
function show(name) {

  const a = oldData[name] || "";
  const b = newData[name] || "";
  const viewer = document.getElementById("viewer");

  const A = splitBlocks(a);
  const B = splitBlocks(b);

  viewer.innerHTML = diffBlocks(A, B);
}

/* DIFF BLOCKS */
function diffBlocks(a, b) {

  const dp = Array(a.length + 1)
    .fill(0)
    .map(() => Array(b.length + 1).fill(0));

  for (let i = a.length - 1; i >= 0; i--) {
    for (let j = b.length - 1; j >= 0; j--) {
      if (a[i] === b[j]) {
        dp[i][j] = dp[i + 1][j + 1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i + 1][j], dp[i][j + 1]);
      }
    }
  }

  let i = 0, j = 0;
  let out = "";

  while (i < a.length && j < b.length) {

    if (a[i] === b[j]) {
      out += wrapBlock(a[i], "");
      i++; j++;
    }

    else if (dp[i + 1][j] >= dp[i][j + 1]) {
      out += wrapBlock(a[i], "remove");
      i++;
    }

    else {
      out += wrapBlock(b[j], "add");
      j++;
    }
  }

  while (i < a.length) {
    out += wrapBlock(a[i], "remove");
    i++;
  }

  while (j < b.length) {
    out += wrapBlock(b[j], "add");
    j++;
  }

  return out;
}

/* BLOCK WRAPPER (VISUAL FIX) */
function wrapBlock(text, type) {
  return `<div class="block ${type}">${escapeHtml(text)}</div>`;
}

/* ESCAPE */
function escapeHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>

</body>
</html>
