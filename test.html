<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Cleaner</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;

  display: flex;
  justify-content: center;
  align-items: center;

  height: 100vh;
}

.wrapper {
  width: 500px;
  background: #2a2525;
  padding: 25px;
  border-radius: 12px;
  border: 1px solid #444;

  display: flex;
  flex-direction: column;
  gap: 16px;
}

.title {
  font-size: 22px;
}

.subtitle {
  color: #aaa;
  font-size: 13px;
}

.upload-label {
  display: flex;
  flex-direction: column;
  gap: 8px;
  color: #ccc;
  font-size: 13px;
}

input[type="file"] {
  background: #3a3434;
  color: white;
  padding: 10px;
  border: 1px solid #555;
}

.buttons {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px;
  cursor: pointer;
  transition: 0.15s;
  font-family: monospace;
}

button:hover {
  background: #5a5454;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.progress-container {
  width: 100%;
  height: 24px;
  background: #3a3434;
  border: 1px solid #555;
  overflow: hidden;
  border-radius: 6px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #777;
  transition: width 0.2s;
}

.status {
  font-size: 13px;
  color: #bbb;
}

::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: #2a2525;
}

::-webkit-scrollbar-thumb {
  background: #555;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="title">Text Cleaner</div>
  <div class="subtitle">
    Upload files or folders, clean them, then download a ZIP.
  </div>

  <label class="upload-label">
    Upload Folder:
    <input type="file" id="files" webkitdirectory multiple>
  </label>

  <div class="buttons">
    <button onclick="processFiles()">Process</button>
    <button onclick="downloadZip()">Download ZIP</button>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status" id="status">
    Waiting for files...
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let cleanedFiles = {};

/* =========================
   CLEANER
========================= */
function cleanText(text) {

  text = text.replace(/[^\x00-\x7F]+/g, " ");

  text = text.replace(/[^\w\s\-.:/\\]/g, " ");

  text = text.replace(/\s+/g, "\n");

  let lines = [];

  for (let line of text.split("\n")) {

    line = line.trim();

    if (line.length < 3)
      continue;

    lines.push(line);
  }

  return lines.join("\n");
}

/* =========================
   PROCESS
========================= */
async function processFiles() {

  cleanedFiles = {};

  const files = document.getElementById("files").files;
  const progressBar = document.getElementById("progressBar");

  if (!files.length) {
    setStatus("No files selected.");
    return;
  }

  setStatus("Starting processing...");
  progressBar.style.width = "0%";

  for (let i = 0; i < files.length; i++) {

    const file = files[i];

    try {

      const text = await file.text();

      const cleaned = cleanText(text);

      let path = file.webkitRelativePath || file.name;

      if (!path.endsWith(".txt")) {
        path += ".txt";
      }

      cleanedFiles[path] = cleaned;

      setStatus(
`Processing:
${path}

${i + 1} / ${files.length} files completed`
      );

    } catch (e) {

      console.error(file.name, e);

      setStatus(
`Failed:
${file.name}`
      );
    }

    const percent = ((i + 1) / files.length) * 100;

    progressBar.style.width = percent + "%";
  }

  setStatus(
`Finished processing.

Total files:
${files.length}`
  );
}
  
/* =========================
   DOWNLOAD ZIP
========================= */
async function downloadZip() {

  const status = document.getElementById("status");

  if (Object.keys(cleanedFiles).length === 0) {
    status.textContent = "No processed files to download.";
    return;
  }

  status.textContent = "Creating ZIP...";

  const zip = new JSZip();

  for (const path in cleanedFiles) {
    zip.file(path, cleanedFiles[path]);
  }

  const blob = await zip.generateAsync({
    type: "blob"
  });

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "cleaned_files.zip";
  a.click();

  status.textContent = "ZIP downloaded.";
}
</script>

</body>
</html>
