<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Folder Diff (Drag & Drop)</title>

<style>
body {
    margin: 0;
    background: #0d1117;
    color: #c9d1d9;
}

header {
    padding: 10px;
    background: #161b22;
}

.dropzone {
    border: 2px dashed #30363d;
    margin: 10px;
    padding: 20px;
    text-align: center;
}

.container {
    display: flex;
    height: 80vh;
}

.sidebar {
    width: 300px;
    border-right: 1px solid #30363d;
    overflow-y: auto;
}

.file {
    padding: 8px;
    cursor: pointer;
    border-bottom: 1px solid #30363d;
}

.file:hover {
    background: #161b22;
}

.viewer {
    flex: 1;
    padding: 10px;
    overflow: auto;
}

.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    font-family: monospace;
}

.left { background: #0b0f14; padding: 4px; border-right: 1px solid #30363d; }
.right { background: #0b0f14; padding: 4px; }

.add { background: #033a16; color: #7ee787; }
.remove { background: #3a0d0d; color: #ff7b72; }
.change { background: #3a2f00; color: #f2cc60; }
</style>
</head>

<body>

<header>
Drag OLD folder → top box | Drag NEW folder → bottom box
</header>

<div class="dropzone" id="oldZone">Drop OLD folder here</div>
<div class="dropzone" id="newZone">Drop NEW folder here</div>

<div class="container">
    <div class="sidebar" id="list"></div>
    <div class="viewer" id="viewer">Load folders to start</div>
</div>

<script>
let oldFiles = {};
let newFiles = {};

function handleDrop(zone, callback) {
    zone.addEventListener("dragover", e => e.preventDefault());

    zone.addEventListener("drop", async e => {
        e.preventDefault();

        const items = [...e.dataTransfer.items];

        const files = {};

        for (const item of items) {
            const entry = item.webkitGetAsEntry();
            if (entry) await readEntry(entry, files);
        }

        callback(files);
    });
}

async function readEntry(entry, files, path="") {
    if (entry.isFile) {
        entry.file(file => {
            const reader = new FileReader();
            reader.onload = () => {
                files[path + entry.name] = reader.result.split("\n");
            };
            reader.readAsText(file);
        });
    }

    if (entry.isDirectory) {
        const reader = entry.createReader();
        const entries = await new Promise(res => reader.readEntries(res));

        for (const e of entries) {
            await readEntry(e, files, path + entry.name + "/");
        }
    }
}

function diff(a, b) {
    const max = Math.max(a.length, b.length);
    const out = [];

    for (let i = 0; i < max; i++) {
        const x = a[i] || "";
        const y = b[i] || "";

        if (x === y) out.push({t:"same",l:x,r:y});
        else if (!x) out.push({t:"add",l:"",r:y});
        else if (!y) out.push({t:"remove",l:x,r:""});
        else out.push({t:"change",l:x,r:y});
    }

    return out;
}

function refresh() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const all = new Set([...Object.keys(oldFiles), ...Object.keys(newFiles)]);

    all.forEach(f => {
        const div = document.createElement("div");
        div.className = "file";
        div.textContent = f;
        div.onclick = () => show(f);
        list.appendChild(div);
    });
}

function show(file) {

    const d = diff(oldFiles[file] || [], newFiles[file] || []);

    let html = `<h3>${file}</h3>`;

    d.forEach(x => {
        html += `<div class="row">`;

        if (x.t === "same") {
            html += `<div class="left">${x.l}</div><div class="right">${x.r}</div>`;
        }
        if (x.t === "add") {
            html += `<div class="left"></div><div class="right add">+ ${x.r}</div>`;
        }
        if (x.t === "remove") {
            html += `<div class="left remove">- ${x.l}</div><div class="right"></div>`;
        }
        if (x.t === "change") {
            html += `<div class="left change">${x.l}</div><div class="right change">${x.r}</div>`;
        }

        html += `</div>`;
    });

    document.getElementById("viewer").innerHTML = html;
}

handleDrop(document.getElementById("oldZone"), f => {
    oldFiles = f;
    refresh();
});

handleDrop(document.getElementById("newZone"), f => {
    newFiles = f;
    refresh();
});
</script>

</body>
</html>
