<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Folder Diff Tool</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d1117;
    color: #c9d1d9;
}

header {
    padding: 10px;
    background: #161b22;
    display: flex;
    gap: 10px;
}

button {
    padding: 8px 12px;
    cursor: pointer;
    background: #238636;
    border: none;
    color: white;
}

.container {
    display: flex;
    height: calc(100vh - 50px);
}

.sidebar {
    width: 300px;
    border-right: 1px solid #30363d;
    overflow-y: auto;
}

.file {
    padding: 8px;
    cursor: pointer;
    border-bottom: 1px solid #30363d;
}

.file:hover {
    background: #161b22;
}

.viewer {
    flex: 1;
    padding: 10px;
    overflow: auto;
}

.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    font-family: monospace;
}

.left { background: #0b0f14; padding: 4px; border-right: 1px solid #30363d; }
.right { background: #0b0f14; padding: 4px; }

.add { background: #033a16; color: #7ee787; }
.remove { background: #3a0d0d; color: #ff7b72; }
.change { background: #3a2f00; color: #f2cc60; }

input { display: none; }
</style>
</head>

<body>

<header>
    <button onclick="oldInput.click()">Select OLD Folder</button>
    <button onclick="newInput.click()">Select NEW Folder</button>

    <input type="file" id="oldInput" webkitdirectory multiple>
    <input type="file" id="newInput" webkitdirectory multiple>
</header>

<div class="container">
    <div class="sidebar" id="list"></div>
    <div class="viewer" id="viewer">Select folders to start</div>
</div>

<script>
let oldFiles = {};
let newFiles = {};

function readFiles(fileList, callback) {
    const files = {};

    [...fileList].forEach(file => {
        const reader = new FileReader();

        reader.onload = () => {
            const path = file.webkitRelativePath || file.name;
            files[path] = reader.result.split("\n");

            if (Object.keys(files).length === fileList.length) {
                callback(files);
            }
        };

        reader.readAsText(file);
    });
}

document.getElementById("oldInput").addEventListener("change", e => {
    readFiles(e.target.files, data => {
        oldFiles = data;
        refresh();
    });
});

document.getElementById("newInput").addEventListener("change", e => {
    readFiles(e.target.files, data => {
        newFiles = data;
        refresh();
    });
});

function diff(a, b) {
    const max = Math.max(a.length, b.length);
    const out = [];

    for (let i = 0; i < max; i++) {
        const x = a[i] || "";
        const y = b[i] || "";

        if (x === y) out.push({t:"same",l:x,r:y});
        else if (!x) out.push({t:"add",l:"",r:y});
        else if (!y) out.push({t:"remove",l:x,r:""});
        else out.push({t:"change",l:x,r:y});
    }

    return out;
}

function refresh() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const all = new Set([...Object.keys(oldFiles), ...Object.keys(newFiles)]);

    all.forEach(file => {
        const div = document.createElement("div");
        div.className = "file";
        div.textContent = file;
        div.onclick = () => show(file);
        list.appendChild(div);
    });
}

function show(file) {

    const d = diff(oldFiles[file] || [], newFiles[file] || []);

    let html = `<h3>${file}</h3>`;

    d.forEach(x => {
        html += `<div class="row">`;

        if (x.t === "same") {
            html += `<div class="left">${x.l}</div><div class="right">${x.r}</div>`;
        }
        if (x.t === "add") {
            html += `<div class="left"></div><div class="right add">+ ${x.r}</div>`;
        }
        if (x.t === "remove") {
            html += `<div class="left remove">- ${x.l}</div><div class="right"></div>`;
        }
        if (x.t === "change") {
            html += `<div class="left change">${x.l}</div><div class="right change">${x.r}</div>`;
        }

        html += `</div>`;
    });

    document.getElementById("viewer").innerHTML = html;
}
</script>

</body>
</html>
