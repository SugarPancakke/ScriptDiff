<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Script Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: Arial;
}

/* TOP BAR */
.topbar {
  padding: 15px;
  display: flex;
  gap: 10px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
}

button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 10px 16px;
  cursor: pointer;
}

button:hover {
  background: #5a5454;
}

input[type="file"] {
  color: white;
}

/* PROGRESS */
#progress {
  flex: 1;
  height: 10px;
  background: #3d3838;
  border-radius: 5px;
  overflow: hidden;
}

#bar {
  height: 100%;
  width: 0%;
  background: #6aa84f;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 70px);
}

/* LEFT FILE LIST */
.left {
  width: 33%;
  background: #2b2626;
  overflow-y: auto;
  border-right: 1px solid #444;
}

.file {
  padding: 10px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
  font-family: monospace;
  display: flex;
  justify-content: space-between;
}

.file:hover {
  background: #3a3434;
}

.tag {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
}

.added { background: #2e7d32; }
.modified { background: #ef6c00; }
.unchanged { background: #555; }

/* RIGHT VIEWER */
.right {
  width: 67%;
  padding: 10px;
  overflow-y: auto;
  font-family: monospace;
  white-space: pre-wrap;
}

/* DIFF STYLES */
.add {
  background: rgba(46,125,50,0.4);
}

.remove {
  background: rgba(183,28,28,0.4);
  text-decoration: line-through;
}

.line {
  display: block;
  padding: 2px 4px;
}
</style>
</head>

<body>

<div class="topbar">
  <input type="file" id="oldFiles" multiple>
  <input type="file" id="newFiles" multiple>

  <button onclick="loadFiles()">Upload & Compare</button>

  <div id="progress"><div id="bar"></div></div>
</div>

<div class="container">

  <div class="left" id="fileList"></div>

  <div class="right" id="viewer">
    Select a file
  </div>

</div>

<script>
let oldData = {};
let newData = {};
let fileStatus = {};
let currentFile = null;

/* READ FILES */
function readFiles(files, store, callback) {
  let loaded = 0;

  for (let file of files) {
    const reader = new FileReader();
    reader.onload = e => {
      store[file.name] = e.target.result;
      loaded++;
      updateProgress(loaded, files.length * 2);
      if (loaded === files.length) callback();
    };
    reader.readAsText(file);
  }
}

/* MAIN LOAD */
function loadFiles() {
  oldData = {};
  newData = {};
  fileStatus = {};

  const oldFiles = document.getElementById("oldFiles").files;
  const newFiles = document.getElementById("newFiles").files;

  let step = 0;
  const total = oldFiles.length + newFiles.length;

  if (!total) return;

  readFiles(oldFiles, oldData, () => {
    readFiles(newFiles, newData, compareFiles);
  });
}

/* PROGRESS BAR */
function updateProgress(done, total) {
  const percent = Math.floor((done / total) * 100);
  document.getElementById("bar").style.width = percent + "%";
}

/* COMPARE */
function compareFiles() {

  const allFiles = new Set([
    ...Object.keys(oldData),
    ...Object.keys(newData)
  ]);

  const list = document.getElementById("fileList");
  list.innerHTML = "";

  allFiles.forEach(name => {

    const oldFile = oldData[name];
    const newFile = newData[name];

    let status = "unchanged";

    if (!oldFile) status = "added";
    else if (!newFile) status = "removed";
    else if (oldFile !== newFile) status = "modified";

    fileStatus[name] = status;

    const div = document.createElement("div");
    div.className = "file";
    div.onclick = () => showFile(name);

    div.innerHTML = `
      <span>${name}</span>
      <span class="tag ${status}">${status}</span>
    `;

    list.appendChild(div);
  });

  updateProgress(1,1);
}

/* SHOW FILE */
function showFile(name) {
  currentFile = name;

  const oldFile = oldData[name] || "";
  const newFile = newData[name] || "";

  const viewer = document.getElementById("viewer");

  if (!oldFile && newFile) {
    viewer.innerHTML = highlight(newFile, "add");
    return;
  }

  if (!newFile && oldFile) {
    viewer.innerHTML = highlight(oldFile, "remove");
    return;
  }

  viewer.innerHTML = diff(oldFile, newFile);
}

/* SIMPLE DIFF */
function diff(oldStr, newStr) {
  const oldLines = oldStr.split("\n");
  const newLines = newStr.split("\n");

  let result = "";

  const max = Math.max(oldLines.length, newLines.length);

  for (let i = 0; i < max; i++) {
    const o = oldLines[i] || "";
    const n = newLines[i] || "";

    if (o === n) {
      result += `<span class="line">${escapeHtml(n)}</span>`;
    } else {
      if (o) result += `<span class="line remove">${escapeHtml(o)}</span>`;
      if (n) result += `<span class="line add">${escapeHtml(n)}</span>`;
    }
  }

  return result;
}

/* HIGHLIGHT SINGLE FILE */
function highlight(text, type) {
  return text.split("\n")
    .map(l => `<span class="line ${type}">${escapeHtml(l)}</span>`)
    .join("");
}

/* ESCAPE */
function escapeHtml(text) {
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}
</script>

</body>
</html>
