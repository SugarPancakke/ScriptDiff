<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Change Dashboard Diff Tool</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d1117;
    color: #c9d1d9;
}

/* TOP BAR */
header {
    padding: 10px;
    background: #161b22;
    display: flex;
    gap: 10px;
    align-items: center;
}

button {
    padding: 8px 12px;
    cursor: pointer;
    background: #238636;
    border: none;
    color: white;
    border-radius: 4px;
}

/* STATUS */
.status {
    margin-left: auto;
    font-size: 13px;
    color: #8b949e;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 50px);
}

/* FILE LIST */
.sidebar {
    width: 380px;
    border-right: 1px solid #30363d;
    overflow-y: auto;
}

.file {
    padding: 10px;
    border-bottom: 1px solid #30363d;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.file:hover {
    background: #161b22;
}

/* BADGES */
.badge {
    font-size: 11px;
    padding: 3px 6px;
    border-radius: 4px;
}

.new { background: #1f6feb; }
.changed { background: #d29922; }
.same { background: #238636; }
.removed { background: #da3633; }

/* CHANGE COUNT */
.count {
    font-size: 12px;
    color: #8b949e;
}

/* VIEWER */
.viewer {
    flex: 1;
    padding: 10px;
    overflow: auto;
}

/* DIFF */
.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    font-family: monospace;
    font-size: 13px;
}

.left {
    background: #0b0f14;
    padding: 4px;
    border-right: 1px solid #30363d;
}

.right {
    background: #0b0f14;
    padding: 4px;
}

.add { background: #033a16; color: #7ee787; }
.remove { background: #3a0d0d; color: #ff7b72; }
.change { background: #3a2f00; color: #f2cc60; }

.hidden { display: none; }
</style>
</head>

<body>

<header>
    <button onclick="oldInput.click()">Load OLD Folder</button>
    <button onclick="newInput.click()">Load NEW Folder</button>

    <input type="file" id="oldInput" webkitdirectory multiple>
    <input type="file" id="newInput" webkitdirectory multiple>

    <div class="status" id="status">Waiting for folders...</div>
</header>

<div class="container">
    <div class="sidebar" id="list"></div>
    <div class="viewer" id="viewer">Load folders first</div>
</div>

<script>
let oldFiles = {};
let newFiles = {};
let fileStats = {};

function setStatus(text) {
    document.getElementById("status").innerText = text;
}

/* READ FILES */
function readFiles(fileList, callback) {

    setStatus("Loading files...");

    const files = {};
    let loaded = 0;

    [...fileList].forEach(file => {

        const reader = new FileReader();

        reader.onload = () => {

            const path = file.webkitRelativePath || file.name;
            files[path] = reader.result.split("\n");

            loaded++;

            if (loaded === fileList.length) {
                setStatus("Loaded " + fileList.length + " files");
                callback(files);
            }
        };

        reader.readAsText(file);
    });
}

/* INPUT EVENTS */
document.getElementById("oldInput").addEventListener("change", e => {
    readFiles(e.target.files, data => {
        oldFiles = data;
        buildDashboard();
    });
});

document.getElementById("newInput").addEventListener("change", e => {
    readFiles(e.target.files, data => {
        newFiles = data;
        buildDashboard();
    });
});

/* CALC DIFF STATS */
function analyzeDiff(oldL, newL) {

    let changes = 0;

    const max = Math.max(oldL.length, newL.length);

    for (let i = 0; i < max; i++) {
        const a = oldL[i] || "";
        const b = newL[i] || "";

        if (a !== b) changes++;
    }

    return changes;
}

/* BUILD DASHBOARD */
function buildDashboard() {

    fileStats = {};

    const all = new Set([
        ...Object.keys(oldFiles),
        ...Object.keys(newFiles)
    ]);

    all.forEach(file => {

        const oldL = oldFiles[file] || [];
        const newL = newFiles[file] || [];

        let type = "same";
        let changes = 0;

        if (!oldFiles[file]) type = "new";
        else if (!newFiles[file]) type = "removed";
        else {
            changes = analyzeDiff(oldL, newL);
            if (changes > 0) type = "changed";
        }

        fileStats[file] = {type, changes};
    });

    renderList();
}

/* RENDER FILE LIST */
function renderList() {

    const list = document.getElementById("list");
    list.innerHTML = "";

    Object.keys(fileStats)
        .sort((a,b) => fileStats[b].changes - fileStats[a].changes)
        .forEach(file => {

        const s = fileStats[file];

        const div = document.createElement("div");
        div.className = "file";

        let badgeClass = "same";
        let label = "SAME";

        if (s.type === "new") { badgeClass = "new"; label = "NEW"; }
        if (s.type === "changed") { badgeClass = "changed"; label = "CHANGED"; }
        if (s.type === "removed") { badgeClass = "removed"; label = "REMOVED"; }

        div.innerHTML = `
            <span>${file}</span>
            <div>
                <span class="badge ${badgeClass}">${label}</span>
                <span class="count">${s.changes ? s.changes + " changes" : ""}</span>
            </div>
        `;

        div.onclick = () => showFile(file);

        list.appendChild(div);
    });

    setStatus("Ready — files analyzed");
}

/* SHOW FILE DIFF */
function showFile(file) {

    const oldL = oldFiles[file] || [];
    const newL = newFiles[file] || [];

    let html = `<h3>${file}</h3>`;

    const max = Math.max(oldL.length, newL.length);

    for (let i = 0; i < max; i++) {

        const a = oldL[i] || "";
        const b = newL[i] || "";

        html += `<div class="row">`;

        if (a === b) {
            html += `<div class="left">${a}</div><div class="right">${b}</div>`;
        }
        else if (!a) {
            html += `<div class="left"></div><div class="right add">+ ${b}</div>`;
        }
        else if (!b) {
            html += `<div class="left remove">- ${a}</div><div class="right"></div>`;
        }
        else {
            html += `<div class="left change">${a}</div><div class="right change">${b}</div>`;
        }

        html += `</div>`;
    }

    document.getElementById("viewer").innerHTML = html;
}
</script>

</body>
</html>
