<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Folder Diff Tool</title>

<style>
  body {
    margin: 0;
    background: #322d2d;
    color: white;
    display: flex;
    justify-content: center;
  }

  .wrapper {
    width: 95%;
    max-width: 900px;
    margin-top: 40px;
  }

  h2 {
    margin-bottom: 20px;
  }

  .buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  button {
    background: #4d4747;
    color: white;
    border: none;
    padding: 12px 30px;
    cursor: pointer;
    font-size: 16px;
  }

  button:hover {
    background: #5a5454;
  }

  .output {
    background: #3d3838;
    padding: 10px;
    min-height: 400px;
    white-space: pre-wrap;
    font-family: monospace;
    overflow-x: auto;
  }

  .meta {
    color: #bbbbbb;
    font-size: 13px;
    margin-bottom: 10px;
  }

  input {
    display: none;
  }

  .add { color: #7ee787; }
  .remove { color: #ff7b72; }
  .change { color: #f2cc60; }
</style>
</head>

<body>

<div class="wrapper">

  <h2>Folder Diff Tool</h2>

  <div class="meta" id="status">Select folders to compare</div>

  <div class="buttons">
    <button onclick="oldInput.click()">Select OLD</button>
    <button onclick="newInput.click()">Select NEW</button>
    <button onclick="compare()">Compare</button>
  </div>

  <input type="file" id="oldInput" webkitdirectory multiple>
  <input type="file" id="newInput" webkitdirectory multiple>

  <div class="output" id="output"></div>

</div>

<script>

let oldFiles = {};
let newFiles = {};

function readFiles(fileList, callback) {

  const files = {};
  let loaded = 0;

  [...fileList].forEach(file => {

    const reader = new FileReader();

    reader.onload = () => {

      const path = file.webkitRelativePath || file.name;
      files[path] = reader.result.split("\n");

      loaded++;

      if (loaded === fileList.length) {
        callback(files);
      }
    };

    reader.readAsText(file);
  });
}

/* LOAD OLD */
document.getElementById("oldInput").addEventListener("change", e => {
  readFiles(e.target.files, data => {
    oldFiles = data;
    document.getElementById("status").innerText = "OLD loaded";
  });
});

/* LOAD NEW */
document.getElementById("newInput").addEventListener("change", e => {
  readFiles(e.target.files, data => {
    newFiles = data;
    document.getElementById("status").innerText = "NEW loaded";
  });
});

/* COMPARE */
function compare() {

  const all = new Set([
    ...Object.keys(oldFiles),
    ...Object.keys(newFiles)
  ]);

  let out = "";
  let changedCount = 0;

  all.forEach(file => {

    const oldL = oldFiles[file] || [];
    const newL = newFiles[file] || [];

    if (oldL.join("") === newL.join("")) return;

    changedCount++;

    out += "\n==============================\n";
    out += file + "\n";
    out += "==============================\n";

    const max = Math.max(oldL.length, newL.length);

    for (let i = 0; i < max; i++) {

      const a = oldL[i] || "";
      const b = newL[i] || "";

      if (a === b) {
        out += a + "\n";
      }
      else if (!a) {
        out += "+ " + b + "\n";
      }
      else if (!b) {
        out += "- " + a + "\n";
      }
      else {
        out += "! " + b + "\n";
      }
    }
  });

  document.getElementById("output").innerHTML =
    `<div class="meta">Changed files: ${changedCount}</div><br>` +
    escape(out);
}

/* SAFE OUTPUT */
function escape(str) {
  return str
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

</script>

</body>
</html>
