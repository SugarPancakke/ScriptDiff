<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Data Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
}

::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

::-webkit-scrollbar-track { background: #2b2626; }
::-webkit-scrollbar-thumb { background: #4d4747; border-radius: 6px; }

* {
  scrollbar-width: thin;
  scrollbar-color: #4d4747 #2b2626;
}

/* TOP BAR */
.topbar {
  padding: 15px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
}

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  gap: 4px;
  color: #ccc;
}

.upload-label input {
  color: white;
  background: #3d3838;
  padding: 6px;
  border: none;
}

button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 10px 16px;
  cursor: pointer;
}

button:hover {
  background: #5a5454;
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 70px);
}

.left {
  width: 33%;
  background: #2b2626;
  overflow-y: auto;
  border-right: 1px solid #444;
}

.file {
  padding: 10px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
  font-family: monospace;
  display: flex;
  justify-content: space-between;
}

.file:hover {
  background: #3a3434;
}

.tag {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
}

.added { background: #2e7d32; }
.modified { background: #ef6c00; }
.unchanged { background: #555; }

.right {
  width: 67%;
  padding: 10px;
  overflow-y: auto;
  font-family: monospace;
  white-space: pre-wrap;
  word-break: break-word;
}

/* DIFF STYLES */
.block {
  display: block;
  padding: 3px 4px;
}

.add {
  background: rgba(46,125,50,0.35);
}

.remove {
  background: rgba(183,28,28,0.35);
  text-decoration: line-through;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Compare</button>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select a file</div>
</div>

<script>
let oldData = {};
let newData = {};

/* CLEAN GARBAGE TEXT */
function cleanText(t) {
  return t
    .replace(/[\u0000-\u001F\u007F-\u009F]/g, "")
    .replace(/\r/g, "");
}

/* REMOVE ROOT FOLDER */
function normalizePath(file) {
  let p = file.webkitRelativePath || file.name;
  return p.split("/").slice(1).join("/");
}

/* READ FILES */
function readFiles(files, store, done) {
  let loaded = 0;
  if (!files.length) return done();

  for (let file of files) {
    const r = new FileReader();

    r.onload = e => {
      const path = normalizePath(file);
      store[path] = cleanText(e.target.result);

      loaded++;
      if (loaded === files.length) done();
    };

    r.readAsText(file);
  }
}

/* LOAD */
function loadFiles() {
  oldData = {};
  newData = {};

  const oldFiles = document.getElementById("oldFiles").files;
  const newFiles = document.getElementById("newFiles").files;

  readFiles(oldFiles, oldData, () => {
    readFiles(newFiles, newData, compareFiles);
  });
}

/* COMPARE FILE LIST */
function compareFiles() {

  const list = document.getElementById("fileList");
  list.innerHTML = "";

  const all = new Set([
    ...Object.keys(oldData),
    ...Object.keys(newData)
  ]);

  all.forEach(name => {

    const o = oldData[name];
    const n = newData[name];

    let status = "unchanged";

    if (!o) status = "added";
    else if (!n) status = "removed";
    else if (o !== n) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.onclick = () => showFile(name);

    div.innerHTML = `
      <span>${name}</span>
      <span class="tag ${status}">${status}</span>
    `;

    list.appendChild(div);
  });
}

/* SHOW FILE */
function showFile(name) {

  const oldFile = oldData[name] || "";
  const newFile = newData[name] || "";
  const viewer = document.getElementById("viewer");

  if (!oldFile) {
    viewer.innerHTML = renderBlocks(newFile, "add");
    return;
  }

  if (!newFile) {
    viewer.innerHTML = renderBlocks(oldFile, "remove");
    return;
  }

  viewer.innerHTML = blockDiff(oldFile, newFile);
}

/* =========================
   BLOCK-BASED DIFF (FIX)
   THIS IS THE IMPORTANT PART
========================= */
function splitBlocks(text) {

  // split by meaningful game-data anchors
  return text.split(
    /(?=InputAction\.|Ability\.|DA\.|PerformanceItem\.|\/Game\/)/
  ).filter(Boolean);
}

function blockDiff(oldStr, newStr) {

  const a = splitBlocks(oldStr);
  const b = splitBlocks(newStr);

  const dp = Array(a.length + 1)
    .fill(null)
    .map(() => Array(b.length + 1).fill(0));

  for (let i = a.length - 1; i >= 0; i--) {
    for (let j = b.length - 1; j >= 0; j--) {
      if (a[i] === b[j]) {
        dp[i][j] = dp[i + 1][j + 1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i + 1][j], dp[i][j + 1]);
      }
    }
  }

  let i = 0, j = 0;
  let out = "";

  while (i < a.length && j < b.length) {

    if (a[i] === b[j]) {
      out += `<div class="block">${escapeHtml(b[j])}</div>`;
      i++; j++;
    }

    else if (dp[i + 1][j] >= dp[i][j + 1]) {
      out += `<div class="block remove">${escapeHtml(a[i])}</div>`;
      i++;
    }

    else {
      out += `<div class="block add">${escapeHtml(b[j])}</div>`;
      j++;
    }
  }

  while (i < a.length) {
    out += `<div class="block remove">${escapeHtml(a[i])}</div>`;
    i++;
  }

  while (j < b.length) {
    out += `<div class="block add">${escapeHtml(b[j])}</div>`;
    j++;
  }

  return out;
}

/* RAW VIEW */
function renderBlocks(text, type) {
  return splitBlocks(text)
    .map(b => `<div class="block ${type}">${escapeHtml(b)}</div>`)
    .join("");
}

/* ESCAPE */
function escapeHtml(t) {
  return t
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}
</script>

</body>
</html>
