<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compare and Contrast</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;

  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* SIDEBAR (matching wrapper style) */
.sidebar {
  width: 240px;
  background: #2a2525;
  padding: 20px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  gap: 25px;

  border-right: 1px solid #444;
}

/* GROUPS */
.group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* BUTTONS (matching your Text Cleaner buttons) */
.tab {
  background: #4d4747;
  padding: 12px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.15s ease;
  user-select: none;

  border: 1px solid #555;
  font-family: monospace;
}

.tab:hover {
  background: #5a5454;
}

/* CONTENT AREA */
.content {
  flex: 1;
  padding: 0;
  margin: 0;
  overflow: hidden;
  display: flex;
}

/* IFRAME FULL AREA */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  background: #322d2d;
}
</style>

</head>

<body>

<div class="sidebar">

  <div class="group">
    <div class="tab" onclick="loadTool('clean.html')">Clean</div>
    <div class="tab" onclick="loadTool('diff.html')">Diff</div>
  </div>

  <div class="group">
    <div class="tab" onclick="loadTool('extract.html')">ID Extractor</div>
    <div class="tab" onclick="loadTool('listdiff.html')">List Diff</div>
  </div>

</div>

<div class="content">
  <iframe id="toolFrame" src="tools/clean.html"></iframe>
</div>

<script>
function loadTool(page) {
  document.getElementById("toolFrame").src = "tools/" + page;
}
</script>

</body>
</html>
