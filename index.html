<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compare and Contrast</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;

  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #2a2525;
  padding: 20px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  gap: 25px;

  border-right: 1px solid #444;
}

/* GROUPS */
.group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* BUTTONS */
.tab {
  background: #4d4747;
  color: white;

  padding: 12px 14px;

  border: none;
  border-radius: 8px;

  cursor: pointer;
  transition: 0.15s ease;
  user-select: none;

  font-family: monospace;
  font-size: 16px;
}

.tab:hover {
  background: #5a5454;
}

/* CONTENT AREA */
.content {
  flex: 1;
  overflow: hidden;
  display: flex;

  background: #322d2d;
}

/* IFRAME */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  background: #322d2d;
}

/* ===== DARK SCROLLBARS ===== */
.sidebar::-webkit-scrollbar,
.content::-webkit-scrollbar,
iframe::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

.sidebar::-webkit-scrollbar-track,
.content::-webkit-scrollbar-track,
iframe::-webkit-scrollbar-track {
  background: #2a2525;
}

.sidebar::-webkit-scrollbar-thumb,
.content::-webkit-scrollbar-thumb,
iframe::-webkit-scrollbar-thumb {
  background: #4a4040;
  border-radius: 8px;
  border: 2px solid #2a2525;
}

.sidebar::-webkit-scrollbar-thumb:hover,
.content::-webkit-scrollbar-thumb:hover,
iframe::-webkit-scrollbar-thumb:hover {
  background: #5a4d4d;
}

/* Firefox */
.sidebar,
.content {
  scrollbar-width: thin;
  scrollbar-color: #4a4040 #2a2525;
}
</style>

</head>

<body>

<div class="sidebar">

  <div class="group">
    <div class="tab" onclick="loadTool('clean.html')">Clean</div>
    <div class="tab" onclick="loadTool('diff.html')">Diff</div>
  </div>

  <div class="group">
    <div class="tab" onclick="loadTool('extract.html')">ID Extractor</div>
    <div class="tab" onclick="loadTool('listdiff.html')">List Diff</div>
  </div>

</div>

<div class="content">
  <iframe id="toolFrame" src="tools/clean.html"></iframe>
</div>

<script>
function loadTool(page) {
  document.getElementById("toolFrame").src = "tools/" + page;
}
</script>

</body>
</html>
