<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Folder Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: Arial;
}

/* SCROLLBAR */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track { background: #2b2626; }
::-webkit-scrollbar-thumb { background: #4d4747; border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: #5a5454; }

* {
  scrollbar-width: thin;
  scrollbar-color: #4d4747 #2b2626;
}

/* TOP BAR */
.topbar {
  padding: 15px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
}

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  gap: 4px;
  color: #ccc;
}

.upload-label input {
  color: white;
  background: #3d3838;
  padding: 6px;
  border: none;
}

button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 10px 16px;
  cursor: pointer;
}

button:hover {
  background: #5a5454;
}

#progress {
  flex: 1;
  height: 10px;
  background: #3d3838;
  border-radius: 5px;
  overflow: hidden;
}

#bar {
  height: 100%;
  width: 0%;
  background: #6aa84f;
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 70px);
}

.left {
  width: 33%;
  background: #2b2626;
  overflow-y: auto;
  border-right: 1px solid #444;
}

.file {
  padding: 10px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
  font-family: monospace;
  display: flex;
  justify-content: space-between;
}

.file:hover { background: #3a3434; }

.tag {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
}

.added { background: #2e7d32; }
.modified { background: #ef6c00; }
.unchanged { background: #555; }

/* VIEWER */
.right {
  width: 67%;
  padding: 10px;
  overflow-y: auto;
  overflow-x: hidden;
  font-family: monospace;

  white-space: pre-wrap;
  word-wrap: break-word;
  overflow-wrap: anywhere;
}

.line {
  display: block;
  padding: 2px 4px;
}

/* DIFF COLORS */
.add {
  background: rgba(46,125,50,0.4);
}

.remove {
  background: rgba(183,28,28,0.4);
  text-decoration: line-through;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Upload & Compare</button>

  <div id="progress"><div id="bar"></div></div>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select a file</div>
</div>

<script>
let oldData = {};
let newData = {};

/* CLEAN TEXT */
function cleanText(text) {
  return text
    .replace(/[\u0000-\u001F\u007F-\u009F]/g, "")
    .replace(/\r/g, "");
}

/* READ FILES */
function readFiles(files, store, callback) {
  let loaded = 0;

  if (!files.length) return callback();

  for (let file of files) {
    const reader = new FileReader();

    reader.onload = e => {

      // REMOVE ROOT FOLDER NAME
      let path = file.webkitRelativePath || file.name;
      path = path.split("/").slice(1).join("/");

      store[path] = cleanText(e.target.result);

      loaded++;
      updateProgress(loaded, files.length * 2);

      if (loaded === files.length) callback();
    };

    reader.readAsText(file);
  }
}

/* LOAD */
function loadFiles() {
  oldData = {};
  newData = {};

  const oldFiles = document.getElementById("oldFiles").files;
  const newFiles = document.getElementById("newFiles").files;

  if (!oldFiles.length && !newFiles.length) return;

  readFiles(oldFiles, oldData, () => {
    readFiles(newFiles, newData, compareFiles);
  });
}

/* PROGRESS */
function updateProgress(done, total) {
  document.getElementById("bar").style.width =
    Math.floor((done / total) * 100) + "%";
}

/* COMPARE FILES */
function compareFiles() {

  const allFiles = new Set([
    ...Object.keys(oldData),
    ...Object.keys(newData)
  ]);

  const list = document.getElementById("fileList");
  list.innerHTML = "";

  allFiles.forEach(name => {

    const oldFile = oldData[name];
    const newFile = newData[name];

    let status = "unchanged";

    if (!oldFile) status = "added";
    else if (!newFile) status = "removed";
    else if (oldFile !== newFile) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.onclick = () => showFile(name);

    div.innerHTML = `
      <span>${name}</span>
      <span class="tag ${status}">${status}</span>
    `;

    list.appendChild(div);
  });

  updateProgress(1, 1);
}

/* SHOW FILE */
function showFile(name) {

  const oldFile = oldData[name] || "";
  const newFile = newData[name] || "";
  const viewer = document.getElementById("viewer");

  if (!oldData[name]) {
    viewer.innerHTML = highlight(newFile, "add");
    return;
  }

  if (!newData[name]) {
    viewer.innerHTML = highlight(oldFile, "remove");
    return;
  }

  viewer.innerHTML = diff(oldFile, newFile);
}

/* =========================
   CHARACTER-LEVEL DIFF (REAL FIX)
========================= */
function diff(oldStr, newStr) {

  oldStr = cleanText(oldStr);
  newStr = cleanText(newStr);

  const a = oldStr.split("\n");
  const b = newStr.split("\n");

  const dp = Array(a.length + 1)
    .fill(null)
    .map(() => Array(b.length + 1).fill(0));

  // LCS (line alignment)
  for (let i = a.length - 1; i >= 0; i--) {
    for (let j = b.length - 1; j >= 0; j--) {
      if (a[i] === b[j]) {
        dp[i][j] = dp[i + 1][j + 1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i + 1][j], dp[i][j + 1]);
      }
    }
  }

  let i = 0, j = 0;
  let out = "";

  while (i < a.length && j < b.length) {

    if (a[i] === b[j]) {
      out += `<span class="line">${charDiff(a[i], b[j])}</span>`;
      i++; j++;
    }

    else if (dp[i + 1][j] >= dp[i][j + 1]) {
      out += `<span class="line remove">${escapeHtml(a[i])}</span>`;
      i++;
    }

    else {
      out += `<span class="line add">${escapeHtml(b[j])}</span>`;
      j++;
    }
  }

  while (i < a.length) {
    out += `<span class="line remove">${escapeHtml(a[i])}</span>`;
    i++;
  }

  while (j < b.length) {
    out += `<span class="line add">${escapeHtml(b[j])}</span>`;
    j++;
  }

  return out;
}

/* =========================
   LETTER-BY-LETTER DIFF
========================= */
function charDiff(oldLine, newLine) {

  let result = "";
  const max = Math.max(oldLine.length, newLine.length);

  for (let i = 0; i < max; i++) {

    const o = oldLine[i];
    const n = newLine[i];

    if (o === n) {
      if (n !== undefined) result += escapeHtml(n);
    } else {
      if (o !== undefined) result += `<span class="remove">${escapeHtml(o)}</span>`;
      if (n !== undefined) result += `<span class="add">${escapeHtml(n)}</span>`;
    }
  }

  return result;
}

/* SINGLE FILE */
function highlight(text, type) {
  text = cleanText(text);

  return text
    .split("\n")
    .map(l => `<span class="line ${type}">${escapeHtml(l)}</span>`)
    .join("");
}

/* ESCAPE */
function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}
</script>

</body>
</html>
