<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Binary Text Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

.topbar {
  padding: 15px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
}

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  gap: 4px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 10px 16px;
  cursor: pointer;
}

button:hover {
  background: #5a5454;
}

.container {
  display: flex;
  height: calc(100vh - 70px);
}

.left {
  width: 30%;
  overflow-y: auto;
  background: #2b2626;
  border-right: 1px solid #444;
}

.right {
  width: 70%;
  padding: 10px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

/* diff styles */
.add {
  background: rgba(46,125,50,0.35);
}

.remove {
  background: rgba(183,28,28,0.35);
}

.file {
  padding: 8px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
}

.file:hover {
  background: #3a3434;
}

.tag {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
}

.modified { background: #ef6c00; }
.added { background: #2e7d32; }
.unchanged { background: #555; }
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Compare</button>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select a file</div>
</div>

<script>
let oldData = {};
let newData = {};

/* CLEAN (important for Lua dumps) */
function cleanText(t) {
  return t.replace(/[\u0000-\u001F\u007F-\u009F]/g, "").replace(/\r/g, "");
}

/* REMOVE ROOT FOLDER */
function normalize(file) {
  return (file.webkitRelativePath || file.name).split("/").slice(1).join("/");
}

/* READ FILES */
function readFiles(files, store, cb) {
  let done = 0;
  if (!files.length) return cb();

  for (let f of files) {
    const r = new FileReader();

    r.onload = e => {
      store[normalize(f)] = cleanText(e.target.result);
      done++;
      if (done === files.length) cb();
    };

    r.readAsText(f);
  }
}

/* LOAD */
function loadFiles() {
  oldData = {};
  newData = {};

  const oldFiles = document.getElementById("oldFiles").files;
  const newFiles = document.getElementById("newFiles").files;

  readFiles(oldFiles, oldData, () => {
    readFiles(newFiles, newData, compare);
  });
}

/* FILE LIST */
function compare() {

  const list = document.getElementById("fileList");
  list.innerHTML = "";

  const all = new Set([...Object.keys(oldData), ...Object.keys(newData)]);

  all.forEach(name => {

    const o = oldData[name];
    const n = newData[name];

    let status = "unchanged";
    if (!o) status = "added";
    else if (!n) status = "removed";
    else if (o !== n) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.onclick = () => show(name);

    div.innerHTML = `
      <span>${name}</span>
      <span class="tag ${status}">${status}</span>
    `;

    list.appendChild(div);
  });
}

/* SHOW FILE */
function show(name) {

  const a = oldData[name] || "";
  const b = newData[name] || "";
  const viewer = document.getElementById("viewer");

  if (!a) {
    viewer.innerHTML = render(b, "add");
    return;
  }

  if (!b) {
    viewer.innerHTML = render(a, "remove");
    return;
  }

  viewer.innerHTML = diff(a, b);
}

/* =========================
   TRUE CHARACTER DIFF (CORE)
========================= */
function diff(oldStr, newStr) {

  oldStr = cleanText(oldStr);
  newStr = cleanText(newStr);

  const a = Array.from(oldStr);
  const b = Array.from(newStr);

  const dp = Array(a.length + 1)
    .fill(null)
    .map(() => Array(b.length + 1).fill(0));

  // LCS
  for (let i = a.length - 1; i >= 0; i--) {
    for (let j = b.length - 1; j >= 0; j--) {
      if (a[i] === b[j]) {
        dp[i][j] = dp[i + 1][j + 1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i + 1][j], dp[i][j + 1]);
      }
    }
  }

  let i = 0, j = 0;
  let out = "";

  while (i < a.length && j < b.length) {

    if (a[i] === b[j]) {
      out += escape(a[i]);
      i++; j++;
    }

    else if (dp[i + 1][j] >= dp[i][j + 1]) {
      out += `<span class="remove">${escape(a[i])}</span>`;
      i++;
    }

    else {
      out += `<span class="add">${escape(b[j])}</span>`;
      j++;
    }
  }

  while (i < a.length) {
    out += `<span class="remove">${escape(a[i])}</span>`;
    i++;
  }

  while (j < b.length) {
    out += `<span class="add">${escape(b[j])}</span>`;
    j++;
  }

  return `<div>${out}</div>`;
}

/* RAW RENDER */
function render(text, type) {
  return Array.from(cleanText(text))
    .map(c => `<span class="${type}">${escape(c)}</span>`)
    .join("");
}

/* ESCAPE */
function escape(t) {
  return t
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}
</script>

</body>
</html>
