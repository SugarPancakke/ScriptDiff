<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Cleaner</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

/* TOPBAR (matches your diff tool style) */
.topbar {
  padding: 15px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
}

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  gap: 4px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

/* BUTTONS */
button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 10px 16px;
  cursor: pointer;
}

button:hover {
  background: #5a5454;
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 70px);
}

/* LEFT PANEL = status */
.left {
  width: 30%;
  background: #2b2626;
  border-right: 1px solid #444;
  padding: 10px;
}

/* RIGHT UNUSED */
.right {
  width: 70%;
  padding: 10px;
}

/* PROGRESS BAR (thin like you wanted) */
.progress-container {
  width: 100%;
  height: 6px;
  background: #3a3434;
  border: 1px solid #555;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #777;
  transition: width 0.2s;
}

/* STATUS BOX */
.status {
  margin-top: 10px;
  font-size: 12px;
  color: #bbb;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Upload Folder:
    <input type="file" id="files" webkitdirectory multiple>
  </label>

  <button onclick="processFiles()">Process</button>
  <button onclick="downloadZip()">Download ZIP</button>

</div>

<div class="container">

  <div class="left">

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status" id="status">
Waiting for files...
    </div>

  </div>

  <div class="right"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let cleanedFiles = {};

/* =========================
   STATUS FIX
========================= */
function setStatus(text) {
  document.getElementById("status").textContent = text;
}

/* =========================
   FULL PYTHON-EQUIVALENT CLEANER
========================= */
function cleanText(text) {

  // 1. specific broken UTF-8 cluster cleanup
  text = text.replace(
    /[ÃÂÆËÌÍÎÏÐÑÒÓÔÕÖ×ØÙÚÛÜÝÞßàáâãäåæçèéêëìíîïðñòóôõö÷øùúûüýþÿœŸŽžŠšŒˆ]+/g,
    " "
  );

  // 2. remove long non-ascii runs (2+ chars)
  text = text.replace(/[^\x00-\x7F]{2,}/g, " ");

  // 3. keep structured characters
  text = text.replace(/[^\w\s\-.:/\\]/g, " ");

  // 4. normalize whitespace
  text = text.replace(/\s+/g, "\n");

  let lines = [];

  for (let line of text.split("\n")) {

    line = line.trim();

    if (line.length < 3)
      continue;

    // 5. letter ratio filter (RESTORED FROM PYTHON)
    let letters = 0;
    let asciiLetters = 0;

    for (let c of line) {
      if (/[a-zA-Z]/.test(c)) {
        letters++;
        asciiLetters++;
      } else if (/[^\x00-\x7F]/.test(c)) {
        letters++;
      }
    }

    if (letters > 0 && (asciiLetters / letters) < 0.6)
      continue;

    lines.push(line);
  }

  return lines.join("\n");
}

/* =========================
   PROCESS FILES
========================= */
async function processFiles() {

  cleanedFiles = {};

  const files = document.getElementById("files").files;
  const bar = document.getElementById("progressBar");

  if (!files.length) {
    setStatus("No files selected.");
    return;
  }

  setStatus("Starting processing...");
  bar.style.width = "0%";

  for (let i = 0; i < files.length; i++) {

    const file = files[i];

    const text = await file.text();
    const cleaned = cleanText(text);

    let name = file.webkitRelativePath || file.name;

    if (!name.endsWith(".txt")) {
      name += ".txt";
    }

    cleanedFiles[name] = cleaned;

    bar.style.width = ((i + 1) / files.length) * 100 + "%";

    setStatus(
`Processing:
${name}

${i + 1} / ${files.length}`
    );
  }

  setStatus(
`Finished processing.

Total files: ${files.length}`
  );
}

/* =========================
   ZIP DOWNLOAD
========================= */
async function downloadZip() {

  if (!Object.keys(cleanedFiles).length) {
    setStatus("No files to download.");
    return;
  }

  setStatus("Creating ZIP...");

  const zip = new JSZip();

  for (const path in cleanedFiles) {
    zip.file(path, cleanedFiles[path]);
  }

  const blob = await zip.generateAsync({ type: "blob" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "cleaned_files.zip";
  a.click();

  setStatus("ZIP downloaded.");
}
</script>

</body>
</html>
