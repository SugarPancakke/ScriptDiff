<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Cleaner</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;

  display: flex;
  justify-content: center;

  align-items: flex-start;
  padding-top: 80px;

  height: 100vh;
}

.wrapper {
  width: 500px;
  background: #2a2525;
  padding: 25px;
  border-radius: 12px;
  border: 1px solid #444;

  display: flex;
  flex-direction: column;
  gap: 16px;
}

.title {
  font-size: 22px;
}

.subtitle {
  color: #aaa;
  font-size: 13px;
}

.upload-label {
  display: flex;
  flex-direction: column;
  gap: 8px;
  color: #ccc;
  font-size: 13px;
}

input[type="file"] {
  background: #3a3434;
  color: white;
  padding: 10px;
  border: 1px solid #555;
}

.buttons {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px;
  cursor: pointer;
  transition: 0.15s;
  font-family: monospace;
}

button:hover {
  background: #5a5454;
}

.progress-container {
  width: 100%;
  height: 10px;
  background: #3a3434;
  border: 1px solid #555;
  overflow: hidden;
  border-radius: 6px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #777;
  transition: width 0.2s;
}

.status {
  font-size: 13px;
  color: #bbb;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="title">Text Cleaner</div>

  <label class="upload-label">
    Upload Folder:
    <input type="file" id="files" webkitdirectory multiple>
  </label>

  <div class="buttons">
    <button onclick="processFiles()">Process</button>
    <button onclick="downloadZip()">Download ZIP</button>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status" id="status">Waiting for files...</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let cleanedFiles = {};

/* STATUS */
function setStatus(text) {
  document.getElementById("status").textContent = text;
}

/* CLEANER */
function cleanText(text) {

  text = text.replace(
    /[ÃÂÆËÌÍÎÏÐÑÒÓÔÕÖ×ØÙÚÛÜÝÞßàáâãäåæçèéêëìíîïðñòóôõö÷øùúûüýþÿœŸŽžŠšŒˆ]+/g,
    " "
  );

  text = text.replace(/[^\x00-\x7F]{2,}/g, " ");
  text = text.replace(/[^\w\s\-.:/\\]/g, " ");
  text = text.replace(/\s+/g, "\n");

  let lines = [];

  for (let line of text.split("\n")) {

    line = line.trim();
    if (line.length < 3) continue;

    let letters = 0;
    let asciiLetters = 0;

    for (let c of line) {
      if (/[a-zA-Z]/.test(c)) {
        letters++;
        asciiLetters++;
      } else if (c.charCodeAt(0) < 128 && /[a-zA-Z]/.test(c)) {
        asciiLetters++;
        letters++;
      } else if (c.charCodeAt(0) >= 128) {
        letters++;
      }
    }

    if (letters > 0 && (asciiLetters / letters) < 0.6)
      continue;

    lines.push(line);
  }

  return lines.join("\n");
}

/* PROCESS */
async function processFiles() {

  cleanedFiles = {};

  const files = document.getElementById("files").files;
  const progressBar = document.getElementById("progressBar");

  if (!files.length) {
    setStatus("No files selected.");
    return;
  }

  setStatus("Starting processing...");
  progressBar.style.width = "0%";

  for (let i = 0; i < files.length; i++) {

    const file = files[i];

    try {

      const text = await file.text();
      const cleaned = cleanText(text);

      let path = file.webkitRelativePath || file.name;

      if (!path.endsWith(".txt")) {
        path += ".txt";
      }

      cleanedFiles[path] = cleaned;

      setStatus(`Processing:\n${path}\n\n${i + 1} / ${files.length}`);

    } catch (e) {
      setStatus("Failed: " + file.name);
    }

    progressBar.style.width = ((i + 1) / files.length) * 100 + "%";
  }

  setStatus(`Finished.\n\nTotal files: ${files.length}`);
}

/* FIXED ZIP LOGIC */
async function downloadZip() {

  if (!Object.keys(cleanedFiles).length) {
    setStatus("No processed files to download.");
    return;
  }

  setStatus("Creating ZIP...");

  const zip = new JSZip();

  let rootFolder = null;

  for (const fullPath in cleanedFiles) {

    const parts = fullPath.split("/");

    // detect root folder from first file
    if (!rootFolder) {
      rootFolder = parts[0];
    }

    const relativePath = parts.slice(1).join("/");

    zip.folder(rootFolder).file(relativePath, cleanedFiles[fullPath]);
  }

  const blob = await zip.generateAsync({ type: "blob" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "cleaned_files.zip";
  a.click();

  setStatus("ZIP downloaded.");
}
</script>

</body>
</html>
