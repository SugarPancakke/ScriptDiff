<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

/* TOP BAR */
.topbar {
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
}

/* PUSH RIGHT */
.spacer {
  flex: 1;
}

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

/* SEARCH */
.search-box {
  background: #3d3838;
  color: white;
  border: none;
  padding: 10px 12px;
  font-size: 14px;
  font-family: monospace;
  width: 240px;
  outline: none;
}

/* FILTER DROPDOWN */
.filter {
  position: relative;
}

.filter-btn {
  background: #4d4747;
  color: white;
  border: none;
  padding: 10px 14px;
  cursor: pointer;
  font-family: monospace;
}

.filter-menu {
  position: absolute;
  top: 110%;
  left: 0;
  background: #2a2525;
  border: 1px solid #444;
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 6px;
  z-index: 10;
}

.filter-menu label {
  display: flex;
  gap: 6px;
  align-items: center;
  cursor: pointer;
  font-size: 13px;
}

/* NAV */
.nav-btn {
  padding: 10px 14px;
  font-size: 14px;
}

#matchCounter {
  min-width: 60px;
  text-align: center;
  color: #ccc;
  font-size: 14px;
}

/* BUTTON */
button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px 30px;
  cursor: pointer;
  font-family: monospace;
}

button:active {
  transform: translateY(1px);
  background: #3f3a3a;
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 74px);
  overflow: hidden;
}

/* LEFT */
.left {
  width: 25%;
  background: #2b2626;
  overflow-y: auto;
  border-right: 1px solid #444;
}

.file {
  position: relative;
  padding: 8px 34px 8px 8px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
  word-break: break-word;
}

.file:hover {
  background: #3d3838;
}

.file.active {
  background: #4d4747;
}

/* DOTS */
.dot {
  position: absolute;
  top: 50%;
  right: 12px;
  transform: translateY(-50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.modified { background: #fbc02d; }
.added { background: #43a047; }
.removed { background: #e53935; }
.unchanged { display: none; }

/* RIGHT */
.right {
  width: 75%;
  padding: 10px;
  overflow-y: auto;
}

/* BLOCKS */
.block {
  margin-bottom: 2px;
  padding: 6px 8px;
  border-radius: 6px;
  background: #2a2525;
  white-space: pre-wrap;
}

.add { background: rgba(46,125,50,0.25); }
.remove {
  background: rgba(183,28,28,0.25);
  text-decoration: line-through;
  opacity: 0.85;
}

/* HIGHLIGHT */
.highlight {
  background: #ffd54f;
  color: black;
}

.active-highlight {
  background: #ff9800;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Compare</button>

  <div class="spacer"></div>

  <!-- FILTER -->
  <div class="filter">
    <button class="filter-btn" onclick="toggleFilter()">Filter ▾</button>

    <div class="filter-menu" id="filterMenu">

      <label><input type="checkbox" checked value="added">Added</label>
      <label><input type="checkbox" checked value="modified">Modified</label>
      <label><input type="checkbox" checked value="removed">Removed</label>
      <label><input type="checkbox" checked value="unchanged">Unchanged</label>

    </div>
  </div>

  <input
    type="text"
    id="searchBox"
    class="search-box"
    placeholder="Search..."
    oninput="runSearch()"
  >

  <button class="nav-btn" onclick="gotoMatch(currentMatch - 1)">↑</button>
  <button class="nav-btn" onclick="gotoMatch(currentMatch + 1)">↓</button>

  <div id="matchCounter">0 / 0</div>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select file</div>
</div>

<script>
let oldData = {};
let newData = {};
let selectedName = null;
let matches = [];
let currentMatch = 0;

function toggleFilter() {
  const menu = document.getElementById("filterMenu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".filter")) {
    document.getElementById("filterMenu").style.display = "none";
  }
});

function loadFiles() {
  oldData = {};
  newData = {};
  selectedName = null;

  readFiles(oldFiles.files, oldData, () => {
    readFiles(newFiles.files, newData, compare);
  });
}

function readFiles(files, store, cb) {
  let done = 0;
  if (!files.length) return cb();

  for (let f of files) {
    const r = new FileReader();
    r.onload = e => {
      store[(f.webkitRelativePath || f.name).split("/").slice(1).join("/")] =
        e.target.result.replace(/\r/g, "");
      done++;
      if (done === files.length) cb();
    };
    r.readAsText(f);
  }
}

function compare() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  const all = new Set([...Object.keys(oldData), ...Object.keys(newData)]);

  all.forEach(name => {

    const o = oldData[name];
    const n = newData[name];

    let status = "unchanged";
    if (!o) status = "added";
    else if (!n) status = "removed";
    else if (o !== n) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.dataset.name = name;
    div.dataset.status = status;

    div.onclick = () => show(name);

    div.innerHTML = `
      <span>${name}</span>
      <span class="dot ${status}"></span>
    `;

    list.appendChild(div);
  });

  runSearch();
}

function runSearch() {

  const search = document.getElementById("searchBox").value.toLowerCase();

  const allowed = [...document.querySelectorAll("#filterMenu input:checked")]
    .map(e => e.value);

  document.querySelectorAll(".file").forEach(file => {

    const name = file.dataset.name;
    const status = file.dataset.status;

    const text = ((oldData[name] || "") + (newData[name] || "")).toLowerCase();

    const matchesSearch = !search || text.includes(search);
    const matchesFilter = allowed.includes(status);

    file.style.display = (matchesSearch && matchesFilter) ? "" : "none";
  });
}

function show(name) {
  selectedName = name;

  document.querySelectorAll(".file").forEach(el =>
    el.classList.toggle("active", el.dataset.name === name)
  );

  const a = oldData[name] || "";
  const b = newData[name] || "";

  document.getElementById("viewer").innerHTML =
    diffBlocks(a.split("\n"), b.split("\n"));
}

function diffBlocks(a, b) {
  let out = "";
  let i = 0, j = 0;

  while (i < a.length || j < b.length) {
    if (a[i] === b[j]) {
      out += `<div class="block">${a[i++]}</div>`;
      j++;
    } else if (!b[j] || (a[i] && a[i] !== b[j])) {
      out += `<div class="block remove">${a[i++] || ""}</div>`;
    } else {
      out += `<div class="block add">${b[j++]}</div>`;
    }
  }
  return out;
}

function gotoMatch(i) {}

</script>

</body>
</html>
