<body style="background:#111; color:white; font-family:'Times New Roman',serif;">

<h2>Outfit List Maker</h2>

<input type="file" id="upload" multiple>

<br><br>

<textarea id="filenameInput"
placeholder="Paste file names here (one per line)..."
style="
width:600px;
height:200px;
background:#222;
color:white;
font-family:'Times New Roman',serif;
border:1px solid #444;
"></textarea>

<br>

<button onclick="generateList()">Generate List</button>
<button onclick="copyList()">Copy</button>
<span id="copyStatus"></span>

<div id="output" style="
margin-top:20px;
white-space:pre-line;
color:white;
font-size:18px;
"></div>

<script>
const orderedIDs = [
    "H","D","C","T","PP","S","BB",
    "AHE","AHC","AEA","ANE","AHA","AXQ",
    "G","AGL","AFA","AXS","ALE","AXK",
    "ABS","AJZ","ARM","ABA","ABK"
];

const idMap = {
    "H":"Hair",
    "D":"Dress",
    "C":"Outerwear",
    "T":"Top",
    "PP":"Bottom",
    "S":"Socks",
    "BB":"Shoes",
    "AHE":"Hair Accessory",
    "AHC":"Headwear",
    "AEA":"Earrings",
    "ANE":"Neckwear",
    "AHA":"Bracelet",
    "AXQ":"Choker",
    "G":"Gloves",
    "AGL":"Face Decoration",
    "AFA":"Face Decoration",
    "AXS":"Chest Accessory",
    "ALE":"Pendant",
    "AXK":"Pendant",
    "ABS":"Backpiece",
    "AJZ":"Rings",
    "ARM":"Arm Decoration",
    "ABA":"Handheld",
    "ABK":"Body Paint"
};

function extractID(name) {
    const match = name.toUpperCase().match(/S\d+([A-Z]+)/);
    if (match) return match[1];
    return null;
}

function generateList() {
    const foundIDs = [];

    const files = document.getElementById("upload").files;

    for (const file of files) {
        const id = extractID(file.name);

        if (id && orderedIDs.includes(id) && !foundIDs.includes(id)) {
            foundIDs.push(id);
        }
    }

    const text = document.getElementById("filenameInput").value;

    const lines = text
        .split(/\r?\n/)
        .map(x => x.trim())
        .filter(Boolean);

    for (const line of lines) {
        const id = extractID(line);

        if (id && orderedIDs.includes(id) && !foundIDs.includes(id)) {
            foundIDs.push(id);
        }
    }

    const result = orderedIDs
        .filter(id => foundIDs.includes(id))
        .map(id => "• " + idMap[id]);

    document.getElementById("output").textContent = result.join("\n");
}

function copyList() {
    const text = document.getElementById("output").textContent;

    if (!text.trim()) return;

    navigator.clipboard.writeText(text).then(() => {
        const status = document.getElementById("copyStatus");
        status.textContent = "Copied!";
        setTimeout(() => status.textContent = "", 1200);
    });
}
</script>

</body>
