<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

/* TOP BAR */
.topbar {
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.spacer { flex: 1; }

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

/* SEARCH */
.search-box {
  background: #3d3838;
  color: white;
  border: none;
  padding: 10px 12px;
  font-size: 14px;
  font-family: monospace;
  width: 240px;
  outline: none;
}

/* NAV */
.nav-btn {
  padding: 10px 14px;
  font-size: 14px;
}

#matchCounter {
  min-width: 60px;
  text-align: center;
  color: #ccc;
  font-size: 14px;
}

/* BUTTON */
button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px 30px;
  cursor: pointer;
  font-family: monospace;
}

button:active {
  transform: translateY(1px);
  background: #3f3a3a;
}

/* FILTER */
.filter { position: relative; }

.filter-menu {
  position: absolute;
  top: 110%;
  left: 0;
  background: #2a2525;
  border: 1px solid #444;
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 6px;
  z-index: 1100;
}

.filter-menu label {
  display: flex;
  gap: 6px;
  align-items: center;
  font-size: 13px;
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 74px);
  overflow: hidden;
}

.left {
  width: 25%;
  background: #2b2626;
  overflow-y: auto;
  border-right: 1px solid #444;
}

.file {
  padding: 8px 34px 8px 8px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
  position: relative;
}

.file:hover { background: #3d3838; }
.file.active { background: #4d4747; }

/* DOTS */
.dot {
  position: absolute;
  top: 50%;
  right: 12px;
  transform: translateY(-50%);
  width: 11px;
  height: 11px;
  border-radius: 50%;
}

.modified { background: #fbc02d; }
.added { background: #43a047; }
.removed { background: #e53935; }
.unchanged { display: none; }

/* RIGHT */
.right {
  width: 75%;
  padding: 10px;
  overflow-y: auto;
}

/* BLOCKS */
.block {
  margin-bottom: 2px;
  padding: 6px 8px;
  background: #2a2525;
  white-space: pre-wrap;
}

.add { background: rgba(46,125,50,0.25); }
.remove { background: rgba(183,28,28,0.25); text-decoration: line-through; }

/* HIGHLIGHT */
.highlight {
  background: #ffd54f;
  color: black;
}

.active-highlight {
  background: #ff9800;
}

/* SCROLLBAR */
.left::-webkit-scrollbar,
.right::-webkit-scrollbar {
  width: 10px;
}

.left::-webkit-scrollbar-thumb,
.right::-webkit-scrollbar-thumb {
  background: #4a4040;
}

/* DRAG OVER FRAME (THIS WAS BREAKING) */
.upload-label.dragover {
  outline: 2px dashed #fbc02d;
  outline-offset: 4px;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Compare</button>

  <div class="spacer"></div>

  <div class="filter">
    <button class="nav-btn" onclick="toggleFilter()">⚙</button>

    <div class="filter-menu" id="filterMenu">
      <label><input type="checkbox" checked value="added">Added</label>
      <label><input type="checkbox" checked value="modified">Modified</label>
      <label><input type="checkbox" checked value="removed">Removed</label>
      <label><input type="checkbox" checked value="unchanged">Unchanged</label>
    </div>
  </div>

  <input type="text" id="searchBox" class="search-box" oninput="runSearch()">

  <button class="nav-btn" onclick="gotoMatch(currentMatch - 1)">↑</button>
  <button class="nav-btn" onclick="gotoMatch(currentMatch + 1)">↓</button>

  <div id="matchCounter">0 / 0</div>
</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select file</div>
</div>

<script>
let oldData = {}, newData = {};
let selectedName = null;
let matches = [], currentMatch = 0;

/* FILTER TOGETHER FIXED */
function updateVisibleFiles() {

  const search = document.getElementById("searchBox").value.trim().toLowerCase();
  const allowed = [...document.querySelectorAll("#filterMenu input:checked")]
    .map(e => e.value);

  document.querySelectorAll(".file").forEach(file => {

    const name = file.dataset.name;
    const status = file.dataset.status;

    const oldText = (oldData[name] || "").toLowerCase();
    const newText = (newData[name] || "").toLowerCase();

    const matchesSearch =
      !search || oldText.includes(search) || newText.includes(search);

    const matchesFilter = allowed.includes(status);

    file.style.display = (matchesSearch && matchesFilter) ? "" : "none";
  });
}

function applyFilters() {
  updateVisibleFiles();
}

document.querySelectorAll("#filterMenu input").forEach(cb =>
  cb.addEventListener("change", applyFilters)
);

/* FILE LOGIC */
function loadFiles() {
  oldData = {}; newData = {}; selectedName = null;

  readFiles(oldFiles.files, oldData, () => {
    readFiles(newFiles.files, newData, compare);
  });
}

function readFiles(files, store, cb) {
  let done = 0;
  if (!files.length) return cb();

  for (let f of files) {
    const r = new FileReader();
    r.onload = e => {
      store[f.webkitRelativePath || f.name] = e.target.result;
      done++;
      if (done === files.length) cb();
    };
    r.readAsText(f);
  }
}

function compare() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  const all = new Set([...Object.keys(oldData), ...Object.keys(newData)]);

  all.forEach(name => {

    const o = oldData[name], n = newData[name];

    let status = "unchanged";
    if (!o) status = "added";
    else if (!n) status = "removed";
    else if (o !== n) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.dataset.name = name;
    div.dataset.status = status;

    div.onclick = () => show(name);

    div.innerHTML = `<span>${name}</span><span class="dot ${status}"></span>`;
    list.appendChild(div);
  });

  runSearch();
  applyFilters();
}

function runSearch() {
  updateVisibleFiles();
}

/* VIEW */
function show(name) {
  selectedName = name;

  document.querySelectorAll(".file").forEach(el =>
    el.classList.toggle("active", el.dataset.name === name)
  );

  const a = (oldData[name] || "").split("\n");
  const b = (newData[name] || "").split("\n");

  document.getElementById("viewer").innerHTML = diff(a, b);
}

function diff(a, b) {
  let out = "";
  for (let i = 0; i < Math.max(a.length, b.length); i++) {
    if (a[i] === b[i]) out += `<div class="block">${a[i] || ""}</div>`;
    else {
      if (a[i]) out += `<div class="block remove">${a[i]}</div>`;
      if (b[i]) out += `<div class="block add">${b[i]}</div>`;
    }
  }
  return out;
}

/* DRAG DROP RESTORED (THIS FIXES YOUR FRAME) */
function enableDrop(labelText, inputId) {
  const input = document.getElementById(inputId);

  const zone = [...document.querySelectorAll(".upload-label")]
    .find(l => l.textContent.includes(labelText));

  zone.addEventListener("dragover", e => {
    e.preventDefault();
    zone.classList.add("dragover");
  });

  zone.addEventListener("dragleave", () =>
    zone.classList.remove("dragover")
  );

  zone.addEventListener("drop", e => {
    e.preventDefault();
    zone.classList.remove("dragover");

    const files = [];
    for (let item of e.dataTransfer.items) {
      const entry = item.webkitGetAsEntry?.();
      if (entry) readEntry(entry, files);
    }

    setTimeout(() => {
      const dt = new DataTransfer();
      files.forEach(f => dt.items.add(f));
      input.files = dt.files;
    }, 200);
  });
}

function readEntry(entry, files) {
  if (entry.isFile) entry.file(f => files.push(f));
  else {
    const r = entry.createReader();
    r.readEntries(e => e.forEach(x => readEntry(x, files)));
  }
}

enableDrop("Old Folder", "oldFiles");
enableDrop("New Folder", "newFiles");
</script>

</body>
</html>
