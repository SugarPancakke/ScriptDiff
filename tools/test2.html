<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

.topbar {
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.spacer { flex: 1; }

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

.search-box {
  background: #3d3838;
  color: white;
  border: none;
  padding: 10px 12px;
  font-size: 14px;
  width: 240px;
  outline: none;
}

.nav-btn {
  padding: 10px 14px;
}

#matchCounter {
  min-width: 60px;
  text-align: center;
  color: #ccc;
}

button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px 30px;
  cursor: pointer;
}

.filter { position: relative; }

.filter-menu {
  position: absolute;
  top: 110%;
  left: 0;
  background: #2a2525;
  border: 1px solid #444;
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 6px;
}

.container {
  display: flex;
  height: calc(100vh - 74px);
  overflow: hidden;
}

.left {
  width: 25%;
  background: #2b2626;
  overflow-y: auto;
  border-right: 1px solid #444;
}

.file {
  padding: 8px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
  position: relative;
}

.file:hover { background: #3d3838; }
.file.active { background: #4d4747; }

.dot {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 11px;
  height: 11px;
  border-radius: 50%;
}

.modified { background: #fbc02d; }
.added { background: #43a047; }
.removed { background: #e53935; }

.right {
  width: 75%;
  padding: 10px;
  overflow-y: auto;
}

.block {
  margin-bottom: 2px;
  padding: 6px 8px;
  background: #2a2525;
  white-space: pre-wrap;
}

.add { background: rgba(46,125,50,0.25); }
.remove { background: rgba(183,28,28,0.25); text-decoration: line-through; }

.highlight { background: #ffd54f; color: black; }
.active-highlight { background: #ff9800; }

.upload-label.dragover {
  outline: 2px dashed #fbc02d;
  outline-offset: 4px;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Compare</button>

  <div class="spacer"></div>

  <div class="filter">
    <button onclick="toggleFilter()">⚙</button>
    <div class="filter-menu" id="filterMenu">
      <label><input type="checkbox" checked value="added">Added</label>
      <label><input type="checkbox" checked value="modified">Modified</label>
      <label><input type="checkbox" checked value="removed">Removed</label>
      <label><input type="checkbox" checked value="unchanged">Unchanged</label>
    </div>
  </div>

  <input type="text" id="searchBox" class="search-box" oninput="runSearch()">

  <button onclick="gotoMatch(currentMatch - 1)">↑</button>
  <button onclick="gotoMatch(currentMatch + 1)">↓</button>

  <div id="matchCounter">0 / 0</div>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer"></div>
</div>

<script>
let oldData = {}, newData = {};
let selectedName = null;
let matches = [], currentMatch = 0;

function toggleFilter() {
  const m = document.getElementById("filterMenu");
  m.style.display = m.style.display === "flex" ? "none" : "flex";
}

document.addEventListener("click", e => {
  if (!e.target.closest(".filter")) {
    document.getElementById("filterMenu").style.display = "none";
  }
});

/* ✅ FIXED FILTER (safe + no recursion) */
function updateVisibleFiles() {

  const search = document.getElementById("searchBox").value.trim().toLowerCase();
  const allowed = [...document.querySelectorAll("#filterMenu input:checked")]
    .map(e => e.value);

  document.querySelectorAll(".file").forEach(file => {

    const name = file.dataset.name;
    const status = file.dataset.status;

    const text = ((oldData[name] || "") + (newData[name] || "")).toLowerCase();

    const okSearch = !search || text.includes(search);
    const okFilter = allowed.includes(status);

    file.style.display = (okSearch && okFilter) ? "" : "none";
  });
}

/* ✅ SEARCH RESTORED */
function runSearch() {
  updateVisibleFiles();

  if (selectedName) {
    show(selectedName); // re-render + re-highlight
  }
}

document.querySelectorAll("#filterMenu input").forEach(cb =>
  cb.addEventListener("change", updateVisibleFiles)
);

/* FILES */
function loadFiles() {
  oldData = {}; newData = {}; selectedName = null;

  read(oldFiles.files, oldData, () =>
    read(newFiles.files, newData, compare)
  );
}

function read(files, store, cb) {
  let done = 0;
  if (!files.length) return cb();

  for (let f of files) {
    const r = new FileReader();
    r.onload = e => {
      store[f.webkitRelativePath || f.name] = e.target.result;
      done++;
      if (done === files.length) cb();
    };
    r.readAsText(f);
  }
}

function compare() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  const all = new Set([...Object.keys(oldData), ...Object.keys(newData)]);

  all.forEach(name => {

    const o = oldData[name], n = newData[name];

    let status = "unchanged";
    if (!o) status = "added";
    else if (!n) status = "removed";
    else if (o !== n) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.dataset.name = name;
    div.dataset.status = status;

    div.onclick = () => show(name);

    div.innerHTML = `<span>${name}</span><span class="dot ${status}"></span>`;
    list.appendChild(div);
  });

  updateVisibleFiles();
}

function show(name) {
  selectedName = name;

  document.querySelectorAll(".file").forEach(f =>
    f.classList.toggle("active", f.dataset.name === name)
  );

  const a = (oldData[name] || "").split("\n");
  const b = (newData[name] || "").split("\n");

  let html = "";
  for (let i = 0; i < Math.max(a.length, b.length); i++) {
    if (a[i] === b[i]) html += `<div class="block">${a[i]||""}</div>`;
    else {
      if (a[i]) html += `<div class="block remove">${a[i]}</div>`;
      if (b[i]) html += `<div class="block add">${b[i]}</div>`;
    }
  }

  document.getElementById("viewer").innerHTML = html;

  highlight();
}

/* SEARCH HIGHLIGHT */
function highlight() {

  const search = document.getElementById("searchBox").value.trim();
  matches = []; currentMatch = 0;

  if (!search) return;

  const blocks = document.querySelectorAll(".block");

  blocks.forEach(b => {
    const r = new RegExp(search, "gi");
    b.innerHTML = b.textContent.replace(r,
      m => `<span class="highlight">${m}</span>`
    );
  });

  matches = [...document.querySelectorAll(".highlight")];
  if (matches.length) gotoMatch(0);
}

function gotoMatch(i) {
  if (!matches.length) return;

  matches.forEach(m => m.classList.remove("active-highlight"));

  currentMatch = (i + matches.length) % matches.length;
  const el = matches[currentMatch];

  el.classList.add("active-highlight");
  el.scrollIntoView({ behavior: "smooth", block: "center" });

  document.getElementById("matchCounter").textContent =
    `${currentMatch + 1} / ${matches.length}`;
}

/* DRAG DROP RESTORED */
function enableDrop(label, id) {
  const input = document.getElementById(id);

  const zone = [...document.querySelectorAll(".upload-label")]
    .find(z => z.textContent.includes(label));

  zone.addEventListener("dragover", e => {
    e.preventDefault();
    zone.classList.add("dragover");
  });

  zone.addEventListener("dragleave", () =>
    zone.classList.remove("dragover")
  );

  zone.addEventListener("drop", e => {
    e.preventDefault();
    zone.classList.remove("dragover");
  });
}

enableDrop("Old Folder", "oldFiles");
enableDrop("New Folder", "newFiles");
</script>

</body>
</html>
