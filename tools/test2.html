<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Outfit List Maker</title>

<style>
body {
    background: #111;
    color: white;
    font-family: "Times New Roman", serif;
    padding: 20px;
}

textarea {
    width: 600px;
    height: 200px;
    background: #222;
    color: white;
    font-family: "Times New Roman", serif;
    border: 1px solid #444;
}

button {
    font-family: "Times New Roman", serif;
    margin-right: 10px;
    cursor: pointer;
}

#output {
    margin-top: 20px;
    padding: 10px;
    border: 1px solid #444;
    background: #1a1a1a;
}

#output ul {
    margin: 0;
    padding-left: 20px;
}

#output li {
    color: white;
    margin-bottom: 4px;
}
</style>
</head>

<body>

<h2>Outfit List Maker</h2>

<input type="file" id="upload" multiple>

<br><br>

<textarea id="filenameInput"
placeholder="Paste file names here (one per line)..."></textarea>

<br><br>

<button onclick="generateList()">Generate List</button>
<button onclick="copyList()">Copy</button>
<span id="copyStatus"></span>

<div id="output"></div>

<script>
const orderedIDs = [
    "H","D","C","T","PP","S","BB",
    "AHE","AHC","AEA","ANE","AHA","AXQ",
    "G","AGL","AFA","AXS","ALE","AXK",
    "ABS","AJZ","ARM","ABA","ABK"
];

const idMap = {
    "H":"Hair",
    "D":"Dress",
    "C":"Outerwear",
    "T":"Top",
    "PP":"Bottom",
    "S":"Socks",
    "BB":"Shoes",
    "AHE":"Hair Accessory",
    "AHC":"Headwear",
    "AEA":"Earrings",
    "ANE":"Neckwear",
    "AHA":"Bracelet",
    "AXQ":"Choker",
    "G":"Gloves",
    "AGL":"Face Decoration",
    "AFA":"Face Decoration",
    "AXS":"Chest Accessory",
    "ALE":"Pendant",
    "AXK":"Pendant",
    "ABS":"Backpiece",
    "AJZ":"Rings",
    "ARM":"Arm Decoration",
    "ABA":"Handheld",
    "ABK":"Body Paint"
};

function extractID(name) {
    const match = name.toUpperCase().match(/S\d+([A-Z]+)/);
    return match ? match[1] : null;
}

function generateList() {
    const foundIDs = [];

    // FILE INPUT
    const files = document.getElementById("upload").files;

    for (const file of files) {
        const id = extractID(file.name);

        if (id && orderedIDs.includes(id) && !foundIDs.includes(id)) {
            foundIDs.push(id);
        }
    }

    // TEXT INPUT
    const text = document.getElementById("filenameInput").value;

    const lines = text
        .split(/\r?\n/)
        .map(x => x.trim())
        .filter(Boolean);

    for (const line of lines) {
        const id = extractID(line);

        if (id && orderedIDs.includes(id) && !foundIDs.includes(id)) {
            foundIDs.push(id);
        }
    }

    // BUILD LIST
    const htmlList = orderedIDs
        .filter(id => foundIDs.includes(id))
        .map(id => `<li>${idMap[id]}</li>`)
        .join("");

    document.getElementById("output").innerHTML =
        `<ul>${htmlList}</ul>`;
}

function copyList() {
    const text = document.getElementById("output").innerText;

    if (!text.trim()) return;

    navigator.clipboard.writeText(text).then(() => {
        const status = document.getElementById("copyStatus");
        status.textContent = "Copied!";
        setTimeout(() => status.textContent = "", 1200);
    });
}
</script>

</body>
</html>
