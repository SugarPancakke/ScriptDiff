<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>List Diff Tool</title>

<style>
  body {
    margin: 0;
    background: #322d2d;
    color: white;
    display: flex;
    justify-content: center;
    font-family: monospace;
  }

  .wrapper {
    width: 95%;
    max-width: 800px;
    margin-top: 40px;
  }

  h2 {
    text-align: center;
  }

  .container {
    display: flex;
    gap: 20px;
  }

  .box {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  textarea {
    width: 100%;
    height: 320px;
    background: #3d3838;
    color: white;
    font-family: monospace;
    font-size: 14px;
    white-space: nowrap;
    overflow-x: auto;
    padding: 10px;
    box-sizing: border-box;
    resize: none;
    border: none;
    outline: none;
  }

  button {
    background: #4d4747;
    color: white;
    border: none;
    margin: 20px auto;
    padding: 12px 30px;
    cursor: pointer;
    font-size: 16px;
    font-family: monospace;
    display: block;
  }

  button:hover {
    background: #5a5454;
  }

  .results {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 20px;
  }

  .result-box {
    flex: 1;
    max-width: 300px;
  }

  ul {
    background: #3d3838;
    padding: 15px;
    min-height: 200px;
    white-space: nowrap;
    overflow-x: auto;
    font-family: monospace;
    list-style-position: inside;
    margin: 0;
    border: none;
  }

  /* ===== DARK SCROLLBARS ===== */
  textarea::-webkit-scrollbar,
  ul::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }

  textarea::-webkit-scrollbar-track,
  ul::-webkit-scrollbar-track {
    background: #2a2525;
  }

  textarea::-webkit-scrollbar-thumb,
  ul::-webkit-scrollbar-thumb {
    background: #4a4040;
    border-radius: 8px;
    border: 2px solid #2a2525;
  }

  textarea::-webkit-scrollbar-thumb:hover,
  ul::-webkit-scrollbar-thumb:hover {
    background: #5a4d4d;
  }

  textarea,
  ul {
    scrollbar-width: thin;
    scrollbar-color: #4a4040 #2a2525;
  }

h3 {
  font-weight: normal;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="container">
    <div class="box">
      <h3>Old List</h3>
      <textarea id="list1" placeholder="One item per line"></textarea>
    </div>

    <div class="box">
      <h3>New List</h3>
      <textarea id="list2" placeholder="One item per line"></textarea>
    </div>
  </div>

  <button onclick="compareLists()">Compare</button>

  <div class="results">
    <div class="result-box">
      <h3>Added</h3>
      <ul id="added"></ul>
    </div>

    <div class="result-box">
      <h3>Overlap</h3>
      <ul id="overlap"></ul>
    </div>
  </div>

</div>

<script>
function compareLists() {
  const list1 = document.getElementById("list1").value
    .split("\n")
    .map(x => x.trim())
    .filter(x => x !== "");

  const list2 = document.getElementById("list2").value
    .split("\n")
    .map(x => x.trim())
    .filter(x => x !== "");

  const set1 = new Set(list1); // current
  const set2 = new Set(list2); // previous

  const added = list1.filter(id => !set2.has(id));

  const overlap = list1.filter(id => set2.has(id));

  const addedList = document.getElementById("added");
  const overlapList = document.getElementById("overlap");

  addedList.innerHTML = "";
  overlapList.innerHTML = "";

  added.forEach(id => {
    const li = document.createElement("li");
    li.textContent = id;
    addedList.appendChild(li);
  });

  overlap.forEach(id => {
    const li = document.createElement("li");
    li.textContent = id;
    overlapList.appendChild(li);
  });
}
</script>

</body>
</html>
