<script>
function compareLists() {
  const list1 = document.getElementById("list1").value
    .split("\n")
    .map(x => x.trim())
    .filter(x => x !== "");

  const list2 = document.getElementById("list2").value
    .split("\n")
    .map(x => x.trim())
    .filter(x => x !== "");

  const set1 = new Set(list1); // current data
  const set2 = new Set(list2); // previously missing

  // FIXED LOGIC
  const added = list1.filter(item => !set2.has(item));
  const removed = list2.filter(item => !set1.has(item));

  const addedList = document.getElementById("added");
  const removedList = document.getElementById("removed");

  addedList.innerHTML = "";
  removedList.innerHTML = "";

  added.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    addedList.appendChild(li);
  });

  removed.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    removedList.appendChild(li);
  });
}
</script>
