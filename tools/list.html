<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Outfit List Maker</title>

<style>
  body {
    margin: 0;
    background: #322d2d;
    color: white;
    display: flex;
    justify-content: center;
    font-family: monospace;
  }

  .wrapper {
    width: 95%;
    max-width: 900px;
    margin-top: 40px;
  }

  h2 {
    text-align: center;
    font-weight: normal;
  }

  input[type="file"] {
    background: #3d3838;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    box-sizing: border-box;
    font-family: monospace;
  }

  textarea {
    width: 100%;
    height: 220px;
    background: #3d3838;
    color: white;
    border: none;
    padding: 10px;
    box-sizing: border-box;
    font-family: monospace;
    font-size: 14px;
    resize: none;
  }

  .buttons {
    display: flex;
    gap: 10px;
    margin: 20px 0;
  }

  button {
    background: #4d4747;
    color: white;
    border: none;
    padding: 12px 30px;
    cursor: pointer;
    font-size: 16px;
    font-family: monospace;
  }

  button:hover {
    background: #5a5454;
  }

  #copyStatus {
    margin-left: 10px;
    color: #ccc;
    font-size: 14px;
  }

  #output {
    background: #3d3838;
    padding: 10px;
    min-height: 200px;
    white-space: pre-wrap;
    font-family: monospace;
    overflow-x: auto;
    box-sizing: border-box;
  }

  #output ul {
    margin: 0;
    padding-left: 20px;
  }

  #output li {
    margin-bottom: 4px;
  }

  /* DARK SCROLLBAR (MATCH OTHER SCRIPTS) */
  textarea::-webkit-scrollbar,
  #output::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }

  textarea::-webkit-scrollbar-track,
  #output::-webkit-scrollbar-track {
    background: #2a2525;
  }

  textarea::-webkit-scrollbar-thumb,
  #output::-webkit-scrollbar-thumb {
    background: #4a4040;
    border-radius: 8px;
    border: 2px solid #2a2525;
  }

  textarea::-webkit-scrollbar-thumb:hover,
  #output::-webkit-scrollbar-thumb:hover {
    background: #5a4d4d;
  }

  textarea,
  #output {
    scrollbar-width: thin;
    scrollbar-color: #4a4040 #2a2525;
  }
</style>
</head>

<body>

<div class="wrapper">

  <h2>Outfit List Maker</h2>

  <input type="file" id="upload" multiple>

  <br><br>

  <textarea id="filenameInput"
  placeholder="Paste file names here (one per line)..."></textarea>

  <div class="buttons">
    <button onclick="generateList()">Generate</button>
    <button onclick="copyList()">Copy</button>
    <span id="copyStatus"></span>
  </div>

  <div id="output"></div>

</div>

<script>
const orderedIDs = [
    "H","D","C","T","PP","S","BB",
    "AHE","AHC","AEA","ANE","AHA","AXQ",
    "G","AGL","AFA","AXS","ALE","AXK",
    "ABS","AJZ","ARM","ABA","ABK"
];

const idMap = {
    "H":"Hair",
    "D":"Dress",
    "C":"Outerwear",
    "T":"Top",
    "PP":"Bottom",
    "S":"Socks",
    "BB":"Shoes",
    "AHE":"Hair Accessory",
    "AHC":"Headwear",
    "AEA":"Earrings",
    "ANE":"Neckwear",
    "AHA":"Bracelet",
    "AXQ":"Choker",
    "G":"Gloves",
    "AGL":"Face Decoration",
    "AFA":"Face Decoration",
    "AXS":"Chest Accessory",
    "ALE":"Pendant",
    "AXK":"Pendant",
    "ABS":"Backpiece",
    "AJZ":"Rings",
    "ARM":"Arm Decoration",
    "ABA":"Handheld",
    "ABK":"Body Paint"
};

function extractID(name) {
    const match = name.toUpperCase().match(/S\d+([A-Z]+)/);
    return match ? match[1] : null;
}

function generateList() {
    const foundIDs = [];

    const files = document.getElementById("upload").files;

    for (const file of files) {
        const id = extractID(file.name);
        if (id && orderedIDs.includes(id) && !foundIDs.includes(id)) {
            foundIDs.push(id);
        }
    }

    const text = document.getElementById("filenameInput").value;

    const lines = text
        .split(/\r?\n/)
        .map(x => x.trim())
        .filter(Boolean);

    for (const line of lines) {
        const id = extractID(line);
        if (id && orderedIDs.includes(id) && !foundIDs.includes(id)) {
            foundIDs.push(id);
        }
    }

    const htmlList = orderedIDs
        .filter(id => foundIDs.includes(id))
        .map(id => `<li>${idMap[id]}</li>`)
        .join("");

    document.getElementById("output").innerHTML =
        `<ul>${htmlList}</ul>`;
}

function copyList() {
    const text = document.getElementById("output").innerText;

    if (!text.trim()) return;

    navigator.clipboard.writeText(text).then(() => {
        const status = document.getElementById("copyStatus");
        status.textContent = "Copied!";
        setTimeout(() => status.textContent = "", 1200);
    });
}
</script>

</body>
</html>
