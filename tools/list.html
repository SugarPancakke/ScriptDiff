<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Outfit List Maker</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  display: flex;
  justify-content: center;
  font-family: monospace;
}

.wrapper {
  width: 95%;
  max-width: 800px;
  margin-top: 40px;
}

h2 {
  text-align: center;
  font-weight: normal;
}

/* SAME LAYOUT STYLE AS DIFF TOOL */
.container {
  display: flex;
  gap: 20px;
}

.box {
  flex: 1;
  display: flex;
  flex-direction: column;
}

textarea {
  width: 100%;
  height: 320px;
  background: #3d3838;
  color: white;
  font-family: monospace;
  font-size: 14px;
  white-space: nowrap;
  overflow-x: auto;
  padding: 10px;
  box-sizing: border-box;
  resize: none;
  border: none;
  outline: none;
}

/* BUTTON (same as diff tool style) */
button {
  background: #4d4747;
  color: white;
  border: none;
  margin: 20px auto;
  padding: 12px 30px;
  cursor: pointer;
  font-size: 16px;
  font-family: monospace;
  display: block;
}

button:hover {
  background: #5a5454;
}

/* RESULTS (MATCH DIFF TOOL STYLE) */
.results {
  display: flex;
  justify-content: center;
  gap: 60px;
  margin-top: 20px;
}

.result-box {
  flex: 1;
  max-width: 300px;
}

ul {
  background: #3d3838;
  padding: 15px;
  min-height: 200px;
  white-space: nowrap;
  overflow-x: auto;
  font-family: monospace;
  list-style-position: inside;
  margin: 0;
  border: none;
}

h3 {
  font-weight: normal;
}

/* ===== SCROLLBARS (SAME AS DIFF TOOL) ===== */
textarea::-webkit-scrollbar,
ul::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

textarea::-webkit-scrollbar-track,
ul::-webkit-scrollbar-track {
  background: #2a2525;
}

textarea::-webkit-scrollbar-thumb,
ul::-webkit-scrollbar-thumb {
  background: #4a4040;
  border-radius: 8px;
  border: 2px solid #2a2525;
}

textarea::-webkit-scrollbar-thumb:hover,
ul::-webkit-scrollbar-thumb:hover {
  background: #5a4d4d;
}

textarea,
ul {
  scrollbar-width: thin;
  scrollbar-color: #4a4040 #2a2525;
}
</style>
</head>

<body>

<div class="wrapper">

  <h2>Outfit List Maker</h2>

  <!-- TWO INPUT BOXES (like diff tool structure, but only one used) -->
  <div class="container">

    <div class="box">
      <h3>File Names</h3>
      <textarea id="filenameInput" placeholder="Paste file names (one per line)"></textarea>
    </div>

    <div class="box">
      <h3>Output Preview</h3>
      <ul id="outputList"></ul>
    </div>

  </div>

  <button onclick="generateList()">Generate</button>

  <div class="results">
    <div class="result-box">
      <h3>Result</h3>
      <ul id="finalList"></ul>
    </div>
  </div>

</div>

<script>
const orderedIDs = [
  "H","D","C","T","PP","S","BB",
  "AHE","AHC","AEA","ANE","AHA","AXQ",
  "G","AGL","AFA","AXS","ALE","AXK",
  "ABS","AJZ","ARM","ABA","ABK"
];

const idMap = {
  "H":"Hair","D":"Dress","C":"Outerwear","T":"Top","PP":"Bottom",
  "S":"Socks","BB":"Shoes","AHE":"Hair Accessory","AHC":"Headwear",
  "AEA":"Earrings","ANE":"Neckwear","AHA":"Bracelet","AXQ":"Choker",
  "G":"Gloves","AGL":"Face Decoration","AFA":"Face Decoration",
  "AXS":"Chest Accessory","ALE":"Pendant","AXK":"Pendant",
  "ABS":"Backpiece","AJZ":"Rings","ARM":"Arm Decoration",
  "ABA":"Handheld","ABK":"Body Paint"
};

function extractID(name) {
  const match = name.toUpperCase().match(/S\d+([A-Z]+)/);
  return match ? match[1] : null;
}

function generateList() {

  const found = [];

  const lines = document.getElementById("filenameInput").value
    .split("\n")
    .map(x => x.trim())
    .filter(Boolean);

  for (const line of lines) {
    const id = extractID(line);
    if (id && orderedIDs.includes(id) && !found.includes(id)) {
      found.push(id);
    }
  }

  const formatted = orderedIDs
    .filter(id => found.includes(id))
    .map(id => `• ${idMap[id]}`);

  // left preview (like diff tool behavior)
  document.getElementById("outputList").innerHTML =
    formatted.map(x => `<li>${x}</li>`).join("");

  // final output
  document.getElementById("finalList").innerHTML =
    formatted.map(x => `<li>${x}</li>`).join("");
}
</script>

</body>
</html>
