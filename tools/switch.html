<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Cleaner (Dual Mode)</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;

  display: flex;
  justify-content: center;
  align-items: flex-start;

  padding-top: 80px;
  min-height: 100vh;
  box-sizing: border-box;
  overflow: hidden;
}

.wrapper {
  width: 500px;
  background: #2a2525;
  padding: 25px;

  display: flex;
  flex-direction: column;
  gap: 16px;
}

.title {
  font-size: 22px;
}

.toggle {
  display: flex;
  background: #3a3434;
  border-radius: 999px;
  padding: 3px;
  width: 90px;  
  margin-bottom: 4px;
  cursor: pointer;
}

.toggle div {
  flex: 1;
  text-align: center;
  padding: 4px 0;
  border-radius: 999px;
  transition: 0.2s;
  font-size: 12px;
  user-select: none;
}

.toggle .active {
  background: #5a5454;
}

.upload-label {
  display: flex;
  flex-direction: column;
  gap: 8px;
  color: #ccc;
  font-size: 13px;
}

input[type="file"] {
  background: #3a3434;
  color: white;
  padding: 10px;
}

.buttons {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px;
  cursor: pointer;
  transition: 0.15s;
  font-family: monospace;
}

button:hover {
  background: #5a5454;
}

.progress-container {
  width: 100%;
  height: 10px;
  background: #3a3434;
  overflow: hidden;
  border-radius: 6px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #777;
  transition: width 0.2s;
}

.status {
  font-size: 13px;
  color: #bbb;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="title">Text Cleaner</div>

  <!-- TOGGLE -->
  <div class="toggle" onclick="switchMode()">
    <div id="modeA" class="active">EN</div>
    <div id="modeB">CN</div>
  </div>

  <label class="upload-label">
    Upload Folder:
    <input type="file" id="files" webkitdirectory multiple>
  </label>

  <div class="buttons">
    <button onclick="processFiles()">Process</button>
    <button onclick="downloadZip()">Download ZIP</button>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status" id="status">Waiting for files...</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

let cleanedFiles = {};
let mode = "en";

/* STATUS */
function setStatus(text) {
  document.getElementById("status").textContent = text;
}

/* TOGGLE MODE */
function switchMode() {
  mode = (mode === "en") ? "cn" : "en";

  document.getElementById("modeA").classList.toggle("active", mode === "en");
  document.getElementById("modeB").classList.toggle("active", mode === "cn");
}

/* =========================
   MODE A: ENGLISH CLEANER
========================= */
function cleanTextEN(text) {

  text = text.replace(
    /[脙脗脝脣脤脥脦脧脨脩脪脫脭脮脰脳脴脵脷脹脺脻脼脽脿谩芒茫盲氓忙莽猫茅锚毛矛铆卯茂冒帽貌贸么玫枚梅酶霉煤没眉媒镁每艙鸥沤啪艩拧艗藛]+/g,
    " "
  );

  text = text.replace(/[^\x00-\x7F]{2,}/g, " ");

  text = text.replace(/[^\w\s\-.:/\\]/g, " ");

  text = text.replace(/\s+/g, "\n");

  let lines = [];

  for (let line of text.split("\n")) {

    line = line.trim();
    if (line.length < 3) continue;

    let letters = 0;
    let asciiLetters = 0;

    for (let c of line) {
      if (/[a-zA-Z]/.test(c)) {
        letters++;
        asciiLetters++;
      } else if (c.charCodeAt(0) < 128 && /[a-zA-Z]/.test(c)) {
        asciiLetters++;
        letters++;
      } else if (c.charCodeAt(0) >= 128) {
        letters++;
      }
    }

    if (letters > 0 && (asciiLetters / letters) < 0.6) continue;

    lines.push(line);
  }

  return lines.join("\n");
}

/* =========================
   MODE B: CHINESE CLEANER
========================= */
function cleanTextCN(text) {

  text = text.replace(
    /[脙脗脝脣脤脥脦脧脨脩脪脫脭脮脰脳脴脵脷脹脺脻脼脽脿谩芒茫盲氓忙莽猫茅锚毛矛铆卯茂冒帽貌贸么玫枚梅酶霉煤没眉媒镁每艙鸥沤啪艩拧艗藛]+/g,
    " "
  );

  text = text.replace(
    /[^\w\s\-.:/\\\u3400-\u4DBF\u4E00-\u9FFF\uF900-\uFAFF]/g,
    " "
  );

  text = text.replace(/\s+/g, "\n");

  let lines = [];

  for (let line of text.split("\n")) {

    line = line.trim();
    if (line.length < 3) continue;

    const chineseCount =
      (line.match(/[\u3400-\u4DBF\u4E00-\u9FFF\uF900-\uFAFF]/g) || []).length;

    if (chineseCount > 0) {
      lines.push(line);
      continue;
    }

    let letters = 0;
    let asciiLetters = 0;

    for (let c of line) {
      if (/[a-zA-Z]/.test(c)) {
        letters++;
        asciiLetters++;
      } else if (c.charCodeAt(0) < 128 && /[a-zA-Z]/.test(c)) {
        asciiLetters++;
        letters++;
      } else if (c.charCodeAt(0) >= 128) {
        letters++;
      }
    }

    if (letters > 0 && (asciiLetters / letters) < 0.6) continue;

    lines.push(line);
  }

  return lines.join("\n");
}

/* =========================
   PROCESS FILES
========================= */
async function processFiles() {

  cleanedFiles = {};

  const files = document.getElementById("files").files;
  const progressBar = document.getElementById("progressBar");

  if (!files || !files.length) {
    setStatus("No files selected.");
    return;
  }

  setStatus("Starting processing...");
  progressBar.style.width = "0%";

  for (let i = 0; i < files.length; i++) {

    const file = files[i];

    try {

      const text = await file.text();

      const cleaned = (mode === "en")
        ? cleanTextEN(text)
        : cleanTextCN(text);

      let path = file.webkitRelativePath || file.name;

      if (!path.endsWith(".txt")) path += ".txt";

      cleanedFiles[path] = cleaned;

      setStatus(`Processing:\n${path}\n\n${i + 1} / ${files.length}`);

    } catch (e) {
      setStatus("Failed: " + file.name);
    }

    progressBar.style.width = ((i + 1) / files.length) * 100 + "%";
  }

  setStatus(`Finished.\n\nTotal files: ${files.length}`);
}

/* =========================
   DOWNLOAD ZIP
========================= */
async function downloadZip() {

  if (Object.keys(cleanedFiles).length === 0) {
    setStatus("No processed files to download.");
    return;
  }

  setStatus("Creating ZIP...");

  const zip = new JSZip();

  for (const path in cleanedFiles) {
    zip.file(path, cleanedFiles[path]);
  }

  const blob = await zip.generateAsync({ type: "blob" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (mode === "en")
    ? "cleaned_files_en.zip"
    : "cleaned_files_cn.zip";

  a.click();

  setStatus("ZIP downloaded.");
}

</script>

</body>
</html>
