<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

/* TOP BAR */
.topbar {
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.spacer { flex: 1; }

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

.search-box {
  background: #3d3838;
  color: white;
  border: none;
  padding: 10px 12px;
  font-size: 14px;
  font-family: monospace;
  width: 240px;
  outline: none;
}

.search-box::placeholder { color: #aaa; }

.nav-btn {
  padding: 10px 14px;
  font-size: 14px;
}

#matchCounter {
  min-width: 60px;
  text-align: center;
  color: #ccc;
  font-size: 14px;
}

button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px 30px;
  font-size: 16px;
  cursor: pointer;
  font-family: monospace;
}

button:active {
  transform: translateY(1px);
  background: #3f3a3a;
}

.filter { position: relative; }

.filter-menu {
  position: absolute;
  top: 110%;
  left: 0;
  background: #2a2525;
  border: 1px solid #444;
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 6px;
  z-index: 1100;
}

.filter-menu label {
  display: flex;
  gap: 6px;
  align-items: center;
  cursor: pointer;
  font-size: 13px;
}

.filter-menu input[type="checkbox"] { accent-color: #888; }

.container {
  display: flex;
  height: calc(100vh - 74px);
  overflow: hidden;
}

.left {
  width: 25%;
  background: #2b2626;
  overflow-y: auto;
  border-right: 1px solid #444;
}

.file {
  position: relative;
  padding: 8px 34px 8px 8px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
}

.file:hover { background: #3d3838; }
.file.active { background: #4d4747; }

.dot {
  position: absolute;
  top: 50%;
  right: 12px;
  transform: translateY(-50%);
  width: 11px;
  height: 11px;
  border-radius: 50%;
}

.modified { background: #fbc02d; }
.added { background: #43a047; }
.removed { background: #e53935; }

.right {
  width: 75%;
  padding: 10px;
  overflow-y: auto;
}

.block {
  margin-bottom: 2px;
  padding: 6px 8px;
  border-radius: 6px;
  background: #2a2525;
  white-space: pre-wrap;
}

.add {
  background: rgba(46,125,50,0.25);
  border-left: 3px solid #2e7d32;
}

.remove {
  background: rgba(183,28,28,0.25);
  border-left: 3px solid #b71c1c;
  text-decoration: line-through;
  opacity: 0.85;
}

.highlight {
  background: #ffd54f;
  color: black;
}

.active-highlight {
  background: #ff9800;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Compare</button>

  <div class="spacer"></div>

  <input type="text" id="searchBox" class="search-box" placeholder="Search..." oninput="runSearch()">

  <button class="nav-btn" onclick="gotoMatch(currentMatch - 1)">↑</button>
  <button class="nav-btn" onclick="gotoMatch(currentMatch + 1)">↓</button>

  <button class="nav-btn" onclick="gotoChange(currentChange - 1)">◀ Edit</button>
  <button class="nav-btn" onclick="gotoChange(currentChange + 1)">Edit ▶</button>

  <div id="changeCounter">0 / 0</div>
  <div id="matchCounter">0 / 0</div>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select file</div>
</div>

<script>
let oldData = {};
let newData = {};
let selectedName = null;

let matches = [];
let currentMatch = 0;

let changeMatches = [];
let currentChange = 0;

/* FILTER */
function toggleFilter() {
  const menu = document.getElementById("filterMenu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

/* FILE LOADING */
function cleanText(t){ return t.replace(/\r/g,""); }

function normalize(file){
  const path = file.webkitRelativePath || file.name;
  return path.includes("/") ? path.split("/").slice(1).join("/") : path;
}

function readFiles(files, store, cb){
  let done = 0;
  for (let f of files){
    const r = new FileReader();
    r.onload = e => {
      store[normalize(f)] = cleanText(e.target.result);
      done++;
      if (done === files.length) cb();
    };
    r.readAsText(f);
  }
}

function loadFiles(){
  oldData = {};
  newData = {};
  readFiles(oldFiles.files, oldData, () => {
    readFiles(newFiles.files, newData, compare);
  });
}

/* COMPARE */
function compare(){
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  const all = new Set([...Object.keys(oldData), ...Object.keys(newData)]);

  all.forEach(name => {
    const o = oldData[name];
    const n = newData[name];

    let status = "unchanged";
    if (!o) status = "added";
    else if (!n) status = "removed";
    else if (o !== n) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.dataset.name = name;
    div.dataset.status = status;
    div.onclick = () => show(name);

    div.innerHTML = `<span>${name}</span><span class="dot ${status}"></span>`;
    list.appendChild(div);
  });

  runSearch();
}

/* SHOW FILE */
function show(name){
  selectedName = name;

  document.querySelectorAll(".file").forEach(el=>{
    el.classList.toggle("active", el.dataset.name === name);
  });

  const a = (oldData[name]||"").split("\n");
  const b = (newData[name]||"").split("\n");

  const viewer = document.getElementById("viewer");

  viewer.innerHTML =
    (a.length > 5000 || b.length > 5000)
      ? diffBlocksLarge(a,b)
      : diffBlocks(a,b);

  viewer.scrollTop = 0;        // ✅ FIX: always top
  collectChanges();            // ✅ EDIT JUMP INIT
  highlightSearch();
}

/* DIFF */
function wrap(t,type){
  return `<div class="block ${type}">${escapeHtml(t||"&nbsp;")}</div>`;
}

function diffBlocksLarge(a,b){
  const setA = new Set(a), setB = new Set(b);
  let out = "";

  for (let x of a) if (!setB.has(x)) out += wrap(x,"remove");
  for (let x of b) if (!setA.has(x)) out += wrap(x,"add");

  return out;
}

function diffBlocks(a,b){
  let i=0,j=0,out="";

  while(i<a.length && j<b.length){
    if(a[i]===b[j]){
      out += wrap(a[i],"");
      i++; j++;
    } else {
      out += wrap(a[i++]||"","remove");
      out += wrap(b[j++]||"","add");
    }
  }

  return out;
}

/* EDIT NAVIGATION */
function collectChanges(){
  changeMatches = [...document.querySelectorAll(".add,.remove")];
  currentChange = 0;
  updateChangeCounter();
}

function gotoChange(i){
  if(!changeMatches.length) return;

  currentChange = (i+changeMatches.length)%changeMatches.length;

  const el = changeMatches[currentChange];
  el.scrollIntoView({behavior:"smooth",block:"center"});
  updateChangeCounter();
}

function updateChangeCounter(){
  document.getElementById("changeCounter").textContent =
    changeMatches.length
      ? `${currentChange+1} / ${changeMatches.length}`
      : "0 / 0";
}

/* SEARCH */
function runSearch(){ highlightSearch(); }

function highlightSearch(){
  const s = searchBox.value.trim();
  matches = [];
  currentMatch = 0;

  if(!s) return;

  const blocks = document.querySelectorAll(".block");

  blocks.forEach(b=>{
    const r = new RegExp(escapeRegExp(s),"gi");
    b.innerHTML = b.innerHTML.replace(r,m=>`<span class="highlight">${m}</span>`);
  });

  matches = [...document.querySelectorAll(".highlight")];
  if(matches.length) gotoMatch(0);
}

function gotoMatch(i){
  if(!matches.length) return;

  currentMatch = (i+matches.length)%matches.length;
  const el = matches[currentMatch];

  el.classList.add("active-highlight");
  el.scrollIntoView({behavior:"smooth",block:"center"});

  matchCounter.textContent = `${currentMatch+1} / ${matches.length}`;
}

/* UTIL */
function escapeHtml(t){
  return t.replace(/&/g,"&amp;")
          .replace(/</g,"&lt;")
          .replace(/>/g,"&gt;");
}

function escapeRegExp(t){
  return t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
}
</script>

</body>
</html>
