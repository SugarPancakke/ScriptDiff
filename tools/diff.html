<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

/* TOP BAR */
.topbar {
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
  z-index: 1000;
}

/* PUSH SEARCH TO FAR RIGHT */
.spacer {
  flex: 1;
}

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

/* SEARCH */
.search-box {
  background: #3d3838;
  color: white;
  border: none;
  padding: 10px 12px;
  font-size: 14px;
  font-family: monospace;
  width: 240px;
  outline: none;
}

.search-box::placeholder {
  color: #aaa;
}

/* NAV BUTTONS */
.nav-btn {
  padding: 10px 14px;
  font-size: 14px;
}

#matchCounter {
  min-width: 60px;
  text-align: center;
  color: #ccc;
  font-size: 14px;
}

/* BUTTON */
button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px 30px;
  font-size: 16px;
  cursor: pointer;
  font-family: monospace;
}

button:active {
  transform: translateY(1px);
  background: #3f3a3a;
}

/* FILTER WRAPPER */
.filter {
  position: relative;
}

/* FILTER MENU */
.filter-menu {
  position: absolute;
  top: 110%;
  left: 0;
  background: #2a2525;
  border: 1px solid #444;
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 6px;
  z-index: 1100;
}

.filter-menu label {
  display: flex;
  gap: 6px;
  align-items: center;
  cursor: pointer;
  font-size: 13px;
}

.filter-menu input[type="checkbox"] {
  accent-color: #888;
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 74px);
  overflow: hidden;
}

/* LEFT PANEL */
.left {
  width: 25%;
  background: #2b2626;
  overflow-y: auto;
  overflow-x: hidden;
  border-right: 1px solid #444;
  position: relative;
  z-index: 1;
}

.file {
  position: relative;
  padding: 8px 34px 8px 8px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.file:hover {
  background: #3d3838;
}

.file.active {
  background: #4d4747;
}

/* STATUS DOT */
.dot {
  position: absolute;
  top: 50%;
  right: 12px;
  transform: translateY(-50%);
  width: 11px;
  height: 11px;
  border-radius: 50%;
}

.modified { background: #fbc02d; }
.added { background: #43a047; }
.removed { background: #e53935; }
.unchanged { display: none; }

/* RIGHT VIEWER */
.right {
  width: 75%;
  padding: 10px;
  overflow-y: auto;
  overflow-x: hidden;
}

/* BLOCKS */
.block {
  margin-bottom: 2px;
  padding: 6px 8px;
  border-radius: 6px;
  background: #2a2525;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.add {
  background: rgba(46,125,50,0.25);
  border-left: 3px solid #2e7d32;
}

.remove {
  background: rgba(183,28,28,0.25);
  border-left: 3px solid #b71c1c;
  text-decoration: line-through;
  opacity: 0.85;
}

/* SEARCH HIGHLIGHT */
.highlight {
  background: #ffd54f;
  color: black;
  border-radius: 2px;
  padding: 0 1px;
}

.active-highlight {
  background: #ff9800;
  color: black;
}

/* SCROLLBARS */
.left::-webkit-scrollbar,
.right::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

.left::-webkit-scrollbar-track,
.right::-webkit-scrollbar-track {
  background: #2a2525;
}

.left::-webkit-scrollbar-thumb,
.right::-webkit-scrollbar-thumb {
  background: #4a4040;
  border-radius: 8px;
  border: 2px solid #2a2525;
}

.left::-webkit-scrollbar-thumb:hover,
.right::-webkit-scrollbar-thumb:hover {
  background: #5a4d4d;
}

.left,
.right {
  scrollbar-width: thin;
  scrollbar-color: #4a4040 #2a2525;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Compare</button>

  <div class="spacer"></div>

  <div class="filter">
    <button class="nav-btn" onclick="toggleFilter()">⚙</button>

    <div class="filter-menu" id="filterMenu">
      <label><input type="checkbox" checked value="added">Added</label>
      <label><input type="checkbox" checked value="modified">Modified</label>
      <label><input type="checkbox" checked value="removed">Removed</label>
      <label><input type="checkbox" checked value="unchanged">Unchanged</label>
    </div>
  </div>

  <input type="text" id="searchBox" class="search-box" placeholder="Search..." oninput="runSearch()">

  <button class="nav-btn" onclick="gotoMatch(currentMatch - 1)">↑</button>
  <button class="nav-btn" onclick="gotoMatch(currentMatch + 1)">↓</button>

  <div id="matchCounter">0 / 0</div>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select file</div>
</div>

<script>
let oldData = {};
let newData = {};
let selectedName = null;

let matches = [];
let currentMatch = 0;

const MAX_SAFE_LINES = 5000;

function toggleFilter() {
  const menu = document.getElementById("filterMenu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".filter")) {
    document.getElementById("filterMenu").style.display = "none";
  }
});

function updateVisibleFiles() {

  const search = document.getElementById("searchBox").value.trim().toLowerCase();

  const allowed = [...document.querySelectorAll("#filterMenu input:checked")]
    .map(e => e.value);

  document.querySelectorAll(".file").forEach(file => {

    const name = file.dataset.name;
    const status = file.dataset.status;

    const oldText = (oldData[name] || "").toLowerCase();
    const newText = (newData[name] || "").toLowerCase();

    const matchesSearch =
      !search ||
      oldText.includes(search) ||
      newText.includes(search);

    file.style.display = (matchesSearch && allowed.includes(status)) ? "" : "none";
  });
}

function applyFilters() {
  updateVisibleFiles();
}

document.querySelectorAll("#filterMenu input").forEach(cb => {
  cb.addEventListener("change", applyFilters);
});

function cleanText(t) {
  return t.replace(/\r/g, "");
}

function normalize(file) {
  const path = file.webkitRelativePath || file.name;
  return path.includes("/") ? path.split("/").slice(1).join("/") : path;
}

function readFiles(files, store, cb) {
  let done = 0;
  if (!files.length) return cb();

  for (let f of files) {
    const r = new FileReader();
    r.onload = e => {
      store[normalize(f)] = cleanText(e.target.result);
      done++;
      if (done === files.length) cb();
    };
    r.readAsText(f);
  }
}

function loadFiles() {
  oldData = {};
  newData = {};
  selectedName = null;

  readFiles(oldFiles.files, oldData, () => {
    readFiles(newFiles.files, newData, compare);
  });
}

function compare() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  const all = new Set([...Object.keys(oldData), ...Object.keys(newData)]);

  all.forEach(name => {

    const o = oldData[name];
    const n = newData[name];

    let status = "unchanged";
    if (!o) status = "added";
    else if (!n) status = "removed";
    else if (o !== n) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.dataset.name = name;
    div.dataset.status = status;

    div.onclick = () => show(name);

    div.innerHTML = `<span>${name}</span><span class="dot ${status}"></span>`;

    list.appendChild(div);
  });

  runSearch();
  applyFilters();
}

function runSearch() {
  updateVisibleFiles();
}

function show(name) {

  selectedName = name;

  document.querySelectorAll(".file").forEach(el => {
    el.classList.toggle("active", el.dataset.name === name);
  });

  const a = oldData[name] || "";
  const b = newData[name] || "";
  const viewer = document.getElementById("viewer");

  const A = a.split("\n");
  const B = b.split("\n");

  if (A.length > MAX_SAFE_LINES || B.length > MAX_SAFE_LINES) {
    viewer.innerHTML = `<div class="block remove">File too large</div>`;
    return;
  }

  viewer.innerHTML = diffBlocks(A, B);
  highlightSearch();
}

/* FIXED DIFF */
function diffBlocks(a, b) {

  const dp = Array(a.length + 1)
    .fill(0)
    .map(() => Array(b.length + 1).fill(0));

  for (let i = a.length - 1; i >= 0; i--) {
    for (let j = b.length - 1; j >= 0; j--) {
      dp[i][j] = (a[i] === b[j])
        ? dp[i + 1][j + 1] + 1
        : Math.max(dp[i + 1][j], dp[i][j + 1]);
    }
  }

  let i = 0, j = 0, out = "";

  while (i < a.length && j < b.length) {
    if (a[i] === b[j]) {
      out += wrap(a[i], "");
      i++; j++;
    } else if (dp[i + 1][j] >= dp[i][j + 1]) {
      out += wrap(a[i++], "remove");
    } else {
      out += wrap(b[j++], "add");
    }
  }

  while (i < a.length) out += wrap(a[i++], "remove");
  while (j < b.length) out += wrap(b[j++], "add");

  return out;
}

function wrap(text, type) {
  if (!text) return `<div class="block ${type}">&nbsp;</div>`;
  return `<div class="block ${type}">${escapeHtml(text)}</div>`;
}

function highlightSearch() {

  const search = document.getElementById("searchBox").value.trim();

  matches = [];
  currentMatch = 0;

  if (!search) return;

  const regex = new RegExp(escapeRegExp(search), "gi");

  const blocks = document.querySelectorAll(".block");

  for (let block of blocks) {
    const text = block.textContent;
    if (!text) continue;

    block.innerHTML = escapeHtml(text).replace(
      regex,
      m => `<span class="highlight">${m}</span>`
    );
  }

  matches = [...document.querySelectorAll(".highlight")];
  if (matches.length) gotoMatch(0);
}

function gotoMatch(index) {

  if (!matches.length) return;

  matches.forEach(m => m.classList.remove("active-highlight"));

  currentMatch = (index + matches.length) % matches.length;

  const el = matches[currentMatch];
  el.classList.add("active-highlight");

  el.scrollIntoView({ behavior: "smooth", block: "center" });

  document.getElementById("matchCounter").textContent =
    `${currentMatch + 1} / ${matches.length}`;
}

function escapeRegExp(text) {
  return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function escapeHtml(t) {
  return t.replace(/&/g,"&amp;")
          .replace(/</g,"&lt;")
          .replace(/>/g,"&gt;");
}
</script>

</body>
</html>
