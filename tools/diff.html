<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

/* TOP BAR */
.topbar {
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.spacer { flex: 1; }

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

.search-box {
  background: #3d3838;
  color: white;
  border: none;
  padding: 10px 12px;
  font-size: 14px;
  font-family: monospace;
  width: 240px;
  outline: none;
}

.search-box::placeholder { color: #aaa; }

.nav-btn { padding: 10px 14px; font-size: 14px; }

#matchCounter {
  min-width: 60px;
  text-align: center;
  color: #ccc;
  font-size: 14px;
}

button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px 30px;
  font-size: 16px;
  cursor: pointer;
  font-family: monospace;
}

button:active {
  transform: translateY(1px);
  background: #3f3a3a;
}

.filter { position: relative; }

.filter-menu {
  position: absolute;
  top: 110%;
  left: 0;
  background: #2a2525;
  border: 1px solid #444;
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 6px;
  z-index: 1100;
}

.filter-menu label {
  display: flex;
  gap: 6px;
  align-items: center;
  cursor: pointer;
  font-size: 13px;
}

.filter-menu input[type="checkbox"] {
  accent-color: #888;
}

.container {
  display: flex;
  height: calc(100vh - 74px);
  overflow: hidden;
}

.left {
  width: 25%;
  background: #2b2626;
  overflow-y: auto;
  border-right: 1px solid #444;
}

.file {
  position: relative;
  padding: 8px 34px 8px 8px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
  word-break: break-word;
}

.file:hover { background: #3d3838; }

.file.active { background: #4d4747; }

.dot {
  position: absolute;
  top: 50%;
  right: 12px;
  transform: translateY(-50%);
  width: 11px;
  height: 11px;
  border-radius: 50%;
}

.modified { background: #fbc02d; }
.added { background: #43a047; }
.removed { background: #e53935; }

.right {
  width: 75%;
  padding: 10px;
  overflow-y: auto;
}

.block {
  margin-bottom: 2px;
  padding: 6px 8px;
  border-radius: 6px;
  background: #2a2525;
  white-space: pre-wrap;
  word-break: break-word;
}

.add {
  background: rgba(46,125,50,0.25);
  border-left: 3px solid #2e7d32;
}

.remove {
  background: rgba(183,28,28,0.25);
  border-left: 3px solid #b71c1c;
  text-decoration: line-through;
  opacity: 0.85;
}

.highlight {
  background: #ffd54f;
  color: black;
  border-radius: 2px;
}

.active-highlight {
  background: #ff9800;
  color: black;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Compare</button>

  <div class="spacer"></div>

  <input type="text" id="searchBox" class="search-box" placeholder="Search..." oninput="runSearch()">

  <button class="nav-btn" onclick="gotoMatch(currentMatch - 1)">↑</button>
  <button class="nav-btn" onclick="gotoMatch(currentMatch + 1)">↓</button>

  <div id="matchCounter">0 / 0</div>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select file</div>
</div>

<script>
let oldData = {};
let newData = {};
let matches = [];
let currentMatch = 0;

const MAX_LINES = 5000;

/* FILE LOADING */
function loadFiles() {
  oldData = {};
  newData = {};

  readFiles(oldFiles.files, oldData, () => {
    readFiles(newFiles.files, newData, compare);
  });
}

function readFiles(files, store, cb) {
  let done = 0;
  if (!files.length) return cb();

  for (let f of files) {
    const r = new FileReader();
    r.onload = e => {
      store[f.webkitRelativePath || f.name] = e.target.result.replace(/\r/g, "");
      done++;
      if (done === files.length) cb();
    };
    r.readAsText(f);
  }
}

function compare() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  const all = new Set([...Object.keys(oldData), ...Object.keys(newData)]);

  all.forEach(name => {

    const o = oldData[name];
    const n = newData[name];

    let status = "unchanged";
    if (!o) status = "added";
    else if (!n) status = "removed";
    else if (o !== n) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.dataset.name = name;

    div.onclick = () => show(name);

    div.innerHTML = `${name}<span class="dot ${status}"></span>`;
    list.appendChild(div);
  });
}

/* SAFE DIFF (FIXED) */
function diffBlocks(a, b) {
  let out = [];

  let i = 0, j = 0;

  while (i < a.length || j < b.length) {

    if (a[i] === b[j]) {
      if (a[i] !== undefined)
        out.push(`<div class="block">${escapeHtml(a[i])}</div>`);
      i++; j++;
    } else {
      if (a[i] !== undefined)
        out.push(`<div class="block remove">${escapeHtml(a[i++])}</div>`);
      if (b[j] !== undefined)
        out.push(`<div class="block add">${escapeHtml(b[j++])}</div>`);
    }
  }

  return out.join("");
}

/* FILE VIEW */
function show(name) {

  const a = oldData[name] || "";
  const b = newData[name] || "";
  const viewer = document.getElementById("viewer");

  const A = a.split("\n");
  const B = b.split("\n");

  if (A.length > MAX_LINES || B.length > MAX_LINES) {
    viewer.innerHTML = `<div class="block remove">File too large</div>`;
    return;
  }

  viewer.innerHTML = diffBlocks(A, B);
}

/* SEARCH */
function runSearch() {}

function gotoMatch() {}

function escapeHtml(t) {
  return t.replace(/&/g,"&amp;")
          .replace(/</g,"&lt;")
          .replace(/>/g,"&gt;");
}
</script>

</body>
</html>
