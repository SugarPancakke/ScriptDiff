<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

/* TOP BAR */
.topbar {
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
}

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

/* BUTTON */
button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px 30px;
  font-size: 16px;
  cursor: pointer;
  font-family: monospace;
}

button:active {
  transform: translateY(1px);
  background: #3f3a3a;
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 60px);
}

/* LEFT PANEL (smaller now) */
.left {
  width: 25%;
  background: #2b2626;
  overflow-y: auto;
  overflow-x: hidden;
  border-right: 1px solid #444;
}

.file {
  padding: 8px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;

  word-break: break-word;
  overflow-wrap: anywhere;
}

.file:hover {
  background: #3a3434;
}

.file.active {
  background: #4a4040;
}

.tag {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
}

.modified { background: #ef6c00; }
.added { background: #2e7d32; }
.unchanged { background: #555; }
.removed { background: #b71c1c; }

/* RIGHT VIEWER */
.right {
  width: 75%;
  padding: 10px;
  overflow-y: auto;
  overflow-x: hidden;
}

/* BLOCKS (FIXED WRAPPING HERE) */
.block {
  margin-bottom: 2px;
  padding: 6px 8px;
  border-radius: 6px;
  background: #2a2525;

  font-family: monospace;

  white-space: pre-wrap;      /* FIX */
  word-break: break-word;     /* FIX */
  overflow-wrap: anywhere;    /* FIX */
}

.add {
  background: rgba(46,125,50,0.25);
  border-left: 3px solid #2e7d32;
}

.remove {
  background: rgba(183,28,28,0.25);
  border-left: 3px solid #b71c1c;
  text-decoration: line-through;
  opacity: 0.85;
}

/* ===== DARK SCROLLBARS ===== */
.left::-webkit-scrollbar,
.right::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

.left::-webkit-scrollbar-track,
.right::-webkit-scrollbar-track {
  background: #2a2525;
}

.left::-webkit-scrollbar-thumb,
.right::-webkit-scrollbar-thumb {
  background: #4a4040;
  border-radius: 8px;
  border: 2px solid #2a2525;
}

.left::-webkit-scrollbar-thumb:hover,
.right::-webkit-scrollbar-thumb:hover {
  background: #5a4d4d;
}

.left,
.right {
  scrollbar-width: thin;
  scrollbar-color: #4a4040 #2a2525;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Compare</button>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select file</div>
</div>

<script>
let oldData = {};
let newData = {};
let selectedName = null;

function cleanText(t) {
  return t.replace(/\r/g, "");
}

function normalize(file) {
  return (file.webkitRelativePath || file.name).split("/").slice(1).join("/");
}

function readFiles(files, store, cb) {
  let done = 0;
  if (!files.length) return cb();

  for (let f of files) {
    const r = new FileReader();

    r.onload = e => {
      store[normalize(f)] = cleanText(e.target.result);
      done++;
      if (done === files.length) cb();
    };

    r.readAsText(f);
  }
}

function loadFiles() {
  oldData = {};
  newData = {};
  selectedName = null;

  readFiles(oldFiles.files, oldData, () => {
    readFiles(newFiles.files, newData, compare);
  });
}

function compare() {

  const list = document.getElementById("fileList");
  list.innerHTML = "";

  const all = new Set([...Object.keys(oldData), ...Object.keys(newData)]);

  all.forEach(name => {

    const o = oldData[name];
    const n = newData[name];

    let status = "unchanged";
    if (!o) status = "added";
    else if (!n) status = "removed";
    else if (o !== n) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.dataset.name = name;

    div.onclick = () => show(name);

    div.innerHTML = `
      <span>${name}</span>
      <span class="tag ${status}">${status}</span>
    `;

    list.appendChild(div);
  });
}

function show(name) {

  selectedName = name;

  document.querySelectorAll(".file").forEach(el => {
    el.classList.toggle("active", el.dataset.name === name);
  });

  const a = oldData[name] || "";
  const b = newData[name] || "";
  const viewer = document.getElementById("viewer");

  const A = a.split("\n");
  const B = b.split("\n");

  viewer.innerHTML = diffBlocks(A, B);
}

function diffBlocks(a, b) {

  const dp = Array(a.length + 1)
    .fill(0)
    .map(() => Array(b.length + 1).fill(0));

  for (let i = a.length - 1; i >= 0; i--) {
    for (let j = b.length - 1; j >= 0; j--) {
      if (a[i] === b[j]) {
        dp[i][j] = dp[i + 1][j + 1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i + 1][j], dp[i][j + 1]);
      }
    }
  }

  let i = 0, j = 0;
  let out = "";

  while (i < a.length && j < b.length) {

    if (a[i] === b[j]) {
      out += wrap(a[i], "");
      i++; j++;
    }
    else if (dp[i + 1][j] >= dp[i][j + 1]) {
      out += wrap(a[i], "remove");
      i++;
    }
    else {
      out += wrap(b[j], "add");
      j++;
    }
  }

  while (i < a.length) out += wrap(a[i++], "remove");
  while (j < b.length) out += wrap(b[j++], "add");

  return out;
}

function wrap(text, type) {
  if (text === "") return `<div class="block ${type}">&nbsp;</div>`;
  return `<div class="block ${type}">${escapeHtml(text)}</div>`;
}

function escapeHtml(t) {
  return t
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}
</script>

</body>
</html>
