<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

.topbar {
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.spacer { flex: 1; }

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

.search-box {
  background: #3d3838;
  color: white;
  border: none;
  padding: 10px 12px;
  font-size: 14px;
  width: 240px;
  outline: none;
  font-family: monospace;
}

.nav-btn {
  padding: 10px 14px;
}

#matchCounter {
  min-width: 60px;
  text-align: center;
  color: #ccc;
}

button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px 30px;
  cursor: pointer;
  font-family: monospace;
}

.container {
  display: flex;
  height: calc(100vh - 74px);
  overflow: hidden;
}

.left {
  width: 25%;
  background: #2b2626;
  overflow-y: auto;
  border-right: 1px solid #444;
}

.file {
  padding: 8px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
}

.file.active {
  background: #4d4747;
}

.right {
  width: 75%;
  padding: 10px;
  overflow-y: auto;
}

.block {
  margin-bottom: 2px;
  padding: 6px 8px;
  background: #2a2525;
  white-space: pre-wrap;
  border-radius: 6px;
}

.add {
  background: rgba(46,125,50,0.25);
  border-left: 3px solid #2e7d32;
}

.remove {
  background: rgba(183,28,28,0.25);
  border-left: 3px solid #b71c1c;
  text-decoration: line-through;
  opacity: 0.85;
}

.active-highlight {
  outline: 2px solid #ff9800;
}

</style>
</head>

<body>

<div class="topbar">

<label class="upload-label">
Old Folder:
<input type="file" id="oldFiles" webkitdirectory multiple>
</label>

<label class="upload-label">
New Folder:
<input type="file" id="newFiles" webkitdirectory multiple>
</label>

<button onclick="loadFiles()">Compare</button>

<div class="spacer"></div>

<input id="searchBox" class="search-box" placeholder="Search..." oninput="runSearch()">

<button onclick="gotoMatch(currentMatch-1)">↑</button>
<button onclick="gotoMatch(currentMatch+1)">↓</button>

<div id="matchCounter">0 / 0</div>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select file</div>
</div>

<script>

let oldData = {};
let newData = {};
let selectedName = null;

/* SEARCH */
let matches = [];
let currentMatch = 0;

/* DIFF NAVIGATION */
let changedBlocks = [];
let currentChanged = -1;

/* ---------------- FILE LOADING ---------------- */

function cleanText(t){ return t.replace(/\r/g,""); }

function normalize(file){
  const path = file.webkitRelativePath || file.name;
  return path.includes("/") ? path.split("/").slice(1).join("/") : path;
}

function readFiles(files, store, cb){
  let done = 0;
  if (!files.length) return cb();

  for (let f of files){
    const r = new FileReader();
    r.onload = e => {
      store[normalize(f)] = cleanText(e.target.result);
      done++;
      if (done === files.length) cb();
    };
    r.readAsText(f);
  }
}

function loadFiles(){
  oldData = {};
  newData = {};
  selectedName = null;

  readFiles(oldFiles.files, oldData, () => {
    readFiles(newFiles.files, newData, compare);
  });
}

/* ---------------- COMPARE ---------------- */

function compare(){
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  const all = new Set([...Object.keys(oldData), ...Object.keys(newData)]);

  all.forEach(name => {
    const o = oldData[name];
    const n = newData[name];

    let status = "unchanged";
    if (!o) status = "added";
    else if (!n) status = "removed";
    else if (o !== n) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.dataset.name = name;
    div.onclick = () => show(name);

    div.innerHTML = name;
    list.appendChild(div);
  });

  runSearch();
}

/* ---------------- SHOW FILE ---------------- */

function show(name){

  selectedName = name;

  document.querySelectorAll(".file").forEach(f=>{
    f.classList.toggle("active", f.dataset.name === name);
  });

  const a = (oldData[name]||"").split("\n");
  const b = (newData[name]||"").split("\n");

  const viewer = document.getElementById("viewer");

  viewer.innerHTML = diffBlocks(a,b);

  highlightSearch();
  refreshChangedBlocks();

}

/* ---------------- DIFF ---------------- */

function diffBlocks(a,b){

  const dp = Array(a.length+1).fill(0).map(()=>Array(b.length+1).fill(0));

  for (let i=a.length-1;i>=0;i--){
    for (let j=b.length-1;j>=0;j--){
      dp[i][j] =
        (a[i]===b[j])
        ? dp[i+1][j+1]+1
        : Math.max(dp[i+1][j],dp[i][j+1]);
    }
  }

  let i=0,j=0,out="";

  while(i<a.length && j<b.length){

    if(a[i]===b[j]){
      out += wrap(a[i],"");
      i++; j++;
    }
    else if(dp[i+1][j] >= dp[i][j+1]){
      out += wrap(a[i++],"remove");
    }
    else{
      out += wrap(b[j++],"add");
    }
  }

  while(i<a.length) out += wrap(a[i++],"remove");
  while(j<b.length) out += wrap(b[j++],"add");

  return out;
}

function wrap(text,type){
  return `<div class="block ${type}">${escapeHtml(text)}</div>`;
}

/* ---------------- SEARCH ---------------- */

function runSearch(){
  highlightSearch();
}

function highlightSearch(){

  const search = document.getElementById("searchBox").value.trim();

  matches = [];
  currentMatch = 0;

  if (!search) return;

  document.querySelectorAll(".block").forEach(block=>{
    const original = block.textContent;

    const regex = new RegExp(escapeRegExp(search),"gi");

    block.innerHTML =
      escapeHtml(original)
      .replace(regex, m=>`<span class="highlight">${m}</span>`);
  });

  matches = [...document.querySelectorAll(".highlight")];

  if (matches.length) gotoMatch(0);
}

/* ---------------- SEARCH NAV ---------------- */

function gotoMatch(index){

  if (!matches.length) return;

  matches.forEach(m=>m.classList.remove("active-highlight"));

  currentMatch = (index + matches.length) % matches.length;

  const el = matches[currentMatch];
  el.classList.add("active-highlight");

  el.scrollIntoView({behavior:"smooth",block:"center"});

  document.getElementById("matchCounter").textContent =
    `${currentMatch+1} / ${matches.length}`;
}

/* ---------------- DIFF NAV ---------------- */

function refreshChangedBlocks(){
  changedBlocks = [...document.querySelectorAll(".add, .remove")];
  currentChanged = -1;
}

function gotoChanged(index){

  if (!changedBlocks.length) return;

  changedBlocks.forEach(b=>b.classList.remove("active-highlight"));

  currentChanged =
    (index + changedBlocks.length) % changedBlocks.length;

  const el = changedBlocks[currentChanged];
  el.classList.add("active-highlight");

  el.scrollIntoView({behavior:"smooth",block:"center"});
}

/* ---------------- KEYBINDS ---------------- */

document.addEventListener("keydown",(e)=>{

  const tag = document.activeElement.tagName;
  if (tag==="INPUT" || tag==="TEXTAREA" || document.activeElement.isContentEditable)
    return;

  const key = e.key.toLowerCase();

  if (key==="j"){
    e.preventDefault();
    gotoChanged(currentChanged+1);
  }

  if (key==="k"){
    e.preventDefault();
    gotoChanged(currentChanged-1);
  }

});

/* ---------------- HELPERS ---------------- */

function escapeRegExp(text){
  return text.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
}

function escapeHtml(t){
  return t
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

</script>

</body>
</html>
