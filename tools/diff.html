<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

/* TOP BAR */
.topbar {
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
  z-index: 1000;
}

/* PUSH SEARCH TO FAR RIGHT */
.spacer {
  flex: 1;
}

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

/* SEARCH */
.search-box {
  background: #3d3838;
  color: white;
  border: none;
  padding: 10px 12px;
  font-size: 14px;
  font-family: monospace;
  width: 240px;
  outline: none;
}

.search-box::placeholder {
  color: #aaa;
}

/* NAV BUTTONS */
.nav-btn {
  padding: 10px 14px;
  font-size: 14px;
}

#matchCounter {
  min-width: 60px;
  text-align: center;
  color: #ccc;
  font-size: 14px;
}

/* BUTTON */
button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px 30px;
  font-size: 16px;
  cursor: pointer;
  font-family: monospace;
}

button:active {
  transform: translateY(1px);
  background: #3f3a3a;
}

/* FILTER WRAPPER */
.filter {
  position: relative;
}

/* FILTER MENU */
.filter-menu {
  position: absolute;
  top: 110%;
  left: 0;
  background: #2a2525;
  border: 1px solid #444;
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 6px;
  z-index: 1100;
}

.filter-menu label {
  display: flex;
  gap: 6px;
  align-items: center;
  cursor: pointer;
  font-size: 13px;
}

.filter-menu input[type="checkbox"] {
  accent-color: #888;
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 74px);
  overflow: hidden;
}

/* LEFT PANEL */
.left {
  width: 25%;
  background: #2b2626;
  overflow-y: auto;
  overflow-x: hidden;
  border-right: 1px solid #444;
  position: relative;
  z-index: 1;
}

.file {
  position: relative;
  padding: 8px 34px 8px 8px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.file:hover {
  background: #3d3838;
}

.file.active {
  background: #4d4747;
}

/* STATUS DOT */
.dot {
  position: absolute;
  top: 50%;
  right: 12px;
  transform: translateY(-50%);
  width: 11px;
  height: 11px;
  border-radius: 50%;
}

.modified { background: #fbc02d; }
.added { background: #43a047; }
.removed { background: #e53935; }
.unchanged { display: none; }

/* RIGHT VIEWER */
.right {
  width: 75%;
  padding: 10px;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
  z-index: 1;
}

/* BLOCKS */
.block {
  margin-bottom: 2px;
  padding: 6px 8px;
  border-radius: 6px;
  background: #2a2525;
  font-family: monospace;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.add {
  background: rgba(46,125,50,0.25);
  border-left: 3px solid #2e7d32;
}

.remove {
  background: rgba(183,28,28,0.25);
  border-left: 3px solid #b71c1c;
  text-decoration: line-through;
  opacity: 0.85;
}

/* SEARCH HIGHLIGHT */
.highlight {
  background: #ffd54f;
  color: black;
  border-radius: 2px;
  padding: 0 1px;
}

.active-highlight {
  background: #ff9800;
  color: black;
}

/* DARK SCROLLBARS */
.left::-webkit-scrollbar,
.right::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

.left::-webkit-scrollbar-track,
.right::-webkit-scrollbar-track {
  background: #2a2525;
}

.left::-webkit-scrollbar-thumb,
.right::-webkit-scrollbar-thumb {
  background: #4a4040;
  border-radius: 8px;
  border: 2px solid #2a2525;
}

.left::-webkit-scrollbar-thumb:hover,
.right::-webkit-scrollbar-thumb:hover {
  background: #5a4d4d;
}

.left,
.right {
  scrollbar-width: thin;
  scrollbar-color: #4a4040 #2a2525;
}

.upload-label.dragover {
  outline: 2px dashed #fbc02d;
  outline-offset: 4px;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Compare</button>

  <div class="spacer"></div>

  <div class="filter">
    <button class="nav-btn" onclick="toggleFilter()">⚙</button>

    <div class="filter-menu" id="filterMenu">
      <label><input type="checkbox" checked value="added">Added</label>
      <label><input type="checkbox" checked value="modified">Modified</label>
      <label><input type="checkbox" checked value="removed">Removed</label>
      <label><input type="checkbox" checked value="unchanged">Unchanged</label>
    </div>
  </div>

  <input type="text" id="searchBox" class="search-box" placeholder="Search..." oninput="runSearch()">

  <button class="nav-btn" onclick="gotoMatch(currentMatch - 1)">↑</button>
  <button class="nav-btn" onclick="gotoMatch(currentMatch + 1)">↓</button>

  <div id="matchCounter">0 / 0</div>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select file</div>
</div>

<script>
let oldData = {};
let newData = {};
let selectedName = null;

let matches = [];
let currentMatch = 0;
let diffMarks = [];

function toggleFilter() {
  const menu = document.getElementById("filterMenu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

/* BLOCK COLLECTOR */
function collectDiffs() {
  diffMarks = [...document.querySelectorAll(".block.add, .block.remove")];
  currentMatch = 0;
}

function gotoDiff(index) {
  if (!diffMarks.length) return;

  diffMarks.forEach(m => m.classList.remove("active-highlight"));

  currentMatch = (index + diffMarks.length) % diffMarks.length;

  const el = diffMarks[currentMatch];
  el.classList.add("active-highlight");

  el.scrollIntoView({ behavior: "smooth", block: "center" });
}

/* 🔥 FULL KEYBOARD CONTROL FIX */
document.addEventListener("keydown", (e) => {

  const tag = document.activeElement.tagName;
  if (tag === "INPUT" || tag === "TEXTAREA") return;

  if (!diffMarks.length) return;

  const keys = ["ArrowDown","ArrowUp","PageDown","PageUp"];

  if (keys.includes(e.key)) {
    e.preventDefault();
    e.stopPropagation();
  }

  // k = next diff (down)
  if (e.key === "k" || e.key === "ArrowDown" || e.key === "PageDown") {
    gotoDiff(currentMatch + 1);
  }

  // j = previous diff (up)
  if (e.key === "j" || e.key === "ArrowUp" || e.key === "PageUp") {
    gotoDiff(currentMatch - 1);
  }

}, true);

/* SHOW FUNCTION HOOK */
function show(name) {
  selectedName = name;

  const viewer = document.getElementById("viewer");
  const a = (oldData[name] || "").split("\n");
  const b = (newData[name] || "").split("\n");

  viewer.innerHTML = diffBlocks(a, b);

  collectDiffs();
}

/* DIFF (unchanged logic placeholder) */
function diffBlocks(a, b) {
  let out = "";
  for (let i = 0; i < Math.max(a.length, b.length); i++) {
    if (a[i] !== b[i]) {
      if (a[i]) out += `<div class="block remove">${a[i]}</div>`;
      if (b[i]) out += `<div class="block add">${b[i]}</div>`;
    }
  }
  return out;
}

/* FILE LOAD (unchanged minimal stub) */
function loadFiles() { console.log("load"); }
function runSearch() {}
function gotoMatch() {}

</script>

</body>
</html>
