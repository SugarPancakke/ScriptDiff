<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Diff Viewer</title>

<style>
body {
  margin: 0;
  background: #322d2d;
  color: white;
  font-family: monospace;
}

/* TOP BAR */
.topbar {
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: #2a2525;
  position: sticky;
  top: 0;
  z-index: 1000;
}

/* PUSH SEARCH TO FAR RIGHT */
.spacer {
  flex: 1;
}

.upload-label {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  color: #ccc;
}

.upload-label input {
  background: #3d3838;
  color: white;
  border: none;
  padding: 6px;
}

/* SEARCH */
.search-box {
  background: #3d3838;
  color: white;
  border: none;
  padding: 10px 12px;
  font-size: 14px;
  font-family: monospace;
  width: 240px;
  outline: none;
}

.search-box::placeholder {
  color: #aaa;
}

/* NAV BUTTONS */
.nav-btn {
  padding: 10px 14px;
  font-size: 14px;
}

#matchCounter {
  min-width: 60px;
  text-align: center;
  color: #ccc;
  font-size: 14px;
}

/* BUTTON */
button {
  background: #4d4747;
  color: white;
  border: none;
  padding: 12px 30px;
  font-size: 16px;
  cursor: pointer;
  font-family: monospace;
}

button:active {
  transform: translateY(1px);
  background: #3f3a3a;
}

/* FILTER WRAPPER */
.filter {
  position: relative;
}

/* FILTER MENU */
.filter-menu {
  position: absolute;
  top: 110%;
  left: 0;
  background: #2a2525;
  border: 1px solid #444;
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 6px;
  z-index: 1100;
}

.filter-menu label {
  display: flex;
  gap: 6px;
  align-items: center;
  cursor: pointer;
  font-size: 13px;
}

.filter-menu input[type="checkbox"] {
  accent-color: #888;
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 74px);
  overflow: hidden;
}

/* LEFT PANEL */
.left {
  width: 25%;
  background: #2b2626;
  overflow-y: auto;
  overflow-x: hidden;
  border-right: 1px solid #444;
  position: relative;
  z-index: 1;
}

.file {
  position: relative;
  padding: 8px 34px 8px 8px;
  border-bottom: 1px solid #3d3838;
  cursor: pointer;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.file:hover {
  background: #3d3838;
}

.file.active {
  background: #4d4747;
}

/* STATUS DOT */
.dot {
  position: absolute;
  top: 50%;
  right: 12px;
  transform: translateY(-50%);
  width: 11px;
  height: 11px;
  border-radius: 50%;
}

.modified { background: #fbc02d; }
.added { background: #43a047; }
.removed { background: #e53935; }
.unchanged { display: none; }

/* RIGHT VIEWER */
.right {
  width: 75%;
  padding: 10px;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
  z-index: 1;
}

/* BLOCKS */
.block {
  margin-bottom: 2px;
  padding: 6px 8px;
  border-radius: 6px;
  background: #2a2525;
  font-family: monospace;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.add {
  background: rgba(46,125,50,0.25);
  border-left: 3px solid #2e7d32;
}

.remove {
  background: rgba(183,28,28,0.25);
  border-left: 3px solid #b71c1c;
  text-decoration: line-through;
  opacity: 0.85;
}

/* SEARCH HIGHLIGHT */
.highlight {
  background: #ffd54f;
  color: black;
  border-radius: 2px;
  padding: 0 1px;
}

.active-highlight {
  background: #ff9800;
  color: black;
}

/* DARK SCROLLBARS */
.left::-webkit-scrollbar,
.right::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

.left::-webkit-scrollbar-track,
.right::-webkit-scrollbar-track {
  background: #2a2525;
}

.left::-webkit-scrollbar-thumb,
.right::-webkit-scrollbar-thumb {
  background: #4a4040;
  border-radius: 8px;
  border: 2px solid #2a2525;
}

.left::-webkit-scrollbar-thumb:hover,
.right::-webkit-scrollbar-thumb:hover {
  background: #5a4d4d;
}

.left,
.right {
  scrollbar-width: thin;
  scrollbar-color: #4a4040 #2a2525;
}

.upload-label.dragover {
  outline: 2px dashed #fbc02d;
  outline-offset: 4px;
}
</style>
</head>

<body>

<div class="topbar">

  <label class="upload-label">
    Old Folder:
    <input type="file" id="oldFiles" webkitdirectory multiple>
  </label>

  <label class="upload-label">
    New Folder:
    <input type="file" id="newFiles" webkitdirectory multiple>
  </label>

  <button onclick="loadFiles()">Compare</button>

  <div class="spacer"></div>

  <div class="filter">
    <button class="nav-btn" onclick="toggleFilter()">⚙</button>

    <div class="filter-menu" id="filterMenu">
      <label><input type="checkbox" checked value="added">Added</label>
      <label><input type="checkbox" checked value="modified">Modified</label>
      <label><input type="checkbox" checked value="removed">Removed</label>
      <label><input type="checkbox" checked value="unchanged">Unchanged</label>
    </div>
  </div>

  <input type="text" id="searchBox" class="search-box" placeholder="Search..." oninput="runSearch()">

  <button class="nav-btn" onclick="gotoMatch(currentMatch - 1)">↑</button>
  <button class="nav-btn" onclick="gotoMatch(currentMatch + 1)">↓</button>

  <div id="matchCounter">0 / 0</div>

</div>

<div class="container">
  <div class="left" id="fileList"></div>
  <div class="right" id="viewer">Select file</div>
</div>

<script>
let oldData = {};
let newData = {};
let selectedName = null;

let matches = [];
let currentMatch = 0;

function toggleFilter() {
  const menu = document.getElementById("filterMenu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".filter")) {
    document.getElementById("filterMenu").style.display = "none";
  }
});

/* ---------------- FIXED FILTER LOGIC ---------------- */

function updateVisibleFiles() {

  const search = document.getElementById("searchBox").value.trim().toLowerCase();

  const allowed = [...document.querySelectorAll("#filterMenu input:checked")]
    .map(e => e.value);

  document.querySelectorAll(".file").forEach(file => {

    const name = file.dataset.name;
    const status = file.dataset.status;

    const oldText = (oldData[name] || "").toLowerCase();
    const newText = (newData[name] || "").toLowerCase();

    const matchesSearch =
      !search ||
      oldText.includes(search) ||
      newText.includes(search);

    const matchesFilter =
      allowed.includes(status);

    file.style.display = (matchesSearch && matchesFilter) ? "" : "none";
  });
}

function applyFilters() {
  updateVisibleFiles();
}

document.querySelectorAll("#filterMenu input").forEach(cb => {
  cb.addEventListener("change", applyFilters);
});

/* ---------------- FILE LOGIC ---------------- */

function cleanText(t) {
  return t.replace(/\r/g, "");
}

function normalize(file) {
  const path = file.webkitRelativePath || file.name;
  return path.includes("/") ? path.split("/").slice(1).join("/") : path;
}

function readFiles(files, store, cb) {
  let done = 0;
  if (!files.length) return cb();

  for (let f of files) {
    const r = new FileReader();

    r.onload = e => {
      store[normalize(f)] = cleanText(e.target.result);
      done++;
      if (done === files.length) cb();
    };

    r.readAsText(f);
  }
}

function loadFiles() {
  oldData = {};
  newData = {};
  selectedName = null;

  readFiles(oldFiles.files, oldData, () => {
    readFiles(newFiles.files, newData, compare);
  });
}

function compare() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  const all = new Set([...Object.keys(oldData), ...Object.keys(newData)]);

  all.forEach(name => {

    const o = oldData[name];
    const n = newData[name];

    let status = "unchanged";
    if (!o) status = "added";
    else if (!n) status = "removed";
    else if (o !== n) status = "modified";

    const div = document.createElement("div");
    div.className = "file";
    div.dataset.name = name;
    div.dataset.status = status;

    div.onclick = () => show(name);

    div.innerHTML = `
      <span>${name}</span>
      <span class="dot ${status}"></span>
    `;

    list.appendChild(div);
  });

  runSearch();
  applyFilters();
}

/* SEARCH NOW USES SAME SYSTEM */

function runSearch() {
  updateVisibleFiles();
}

/* ---------------- EVERYTHING ELSE UNCHANGED ---------------- */

function show(name) {

  selectedName = name;

  document.querySelectorAll(".file").forEach(el => {
    el.classList.toggle("active", el.dataset.name === name);
  });

  const a = oldData[name] || "";
  const b = newData[name] || "";
  const viewer = document.getElementById("viewer");

  const A = a.split("\n");
  const B = b.split("\n");

  viewer.innerHTML = diffBlocks(A, B);

  highlightSearch();
}

function diffBlocks(a, b) {

  const out = [];

  let i = 0;
  let j = 0;

  while (i < a.length && j < b.length) {

    if (a[i] === b[j]) {
      out.push(wrap(a[i], ""));
      i++;
      j++;
      continue;
    }

    let foundInB = -1;

    for (let k = j + 1; k < Math.min(j + 40, b.length); k++) {
      if (a[i] === b[k]) {
        foundInB = k;
        break;
      }
    }

    if (foundInB !== -1) {

      while (j < foundInB) {
        out.push(wrap(b[j], "add"));
        j++;
      }

      continue;
    }

    let foundInA = -1;

    for (let k = i + 1; k < Math.min(i + 40, a.length); k++) {
      if (a[k] === b[j]) {
        foundInA = k;
        break;
      }
    }

    if (foundInA !== -1) {

      while (i < foundInA) {
        out.push(wrap(a[i], "remove"));
        i++;
      }

      continue;
    }

    out.push(wrap(a[i], "remove"));
    out.push(wrap(b[j], "add"));

    i++;
    j++;
  }
  
  while (i < a.length) {
    out.push(wrap(a[i], "remove"));
    i++;
  }

  while (j < b.length) {
    out.push(wrap(b[j], "add"));
    j++;
  }

  return out.join("");
}

function wrap(text, type) {
  if (!text) return `<div class="block ${type}">&nbsp;</div>`;
  return `<div class="block ${type}">${escapeHtml(text)}</div>`;
}

function highlightSearch() {

  const search = document.getElementById("searchBox").value.trim();

  matches = [];
  currentMatch = 0;

  if (!search) return;

  const blocks = document.querySelectorAll(".block");

  blocks.forEach(block => {
    const original = block.textContent;
    const regex = new RegExp(escapeRegExp(search), "gi");

    block.innerHTML = escapeHtml(original)
      .replace(regex, m => `<span class="highlight">${m}</span>`);
  });

  matches = [...document.querySelectorAll(".highlight")];

  if (matches.length) gotoMatch(0);
}

function gotoMatch(index) {

  if (!matches.length) return;

  matches.forEach(m => m.classList.remove("active-highlight"));

  currentMatch = (index + matches.length) % matches.length;

  const el = matches[currentMatch];
  el.classList.add("active-highlight");

  el.scrollIntoView({ behavior: "smooth", block: "center" });

  document.getElementById("matchCounter").textContent =
    `${currentMatch + 1} / ${matches.length}`;
}

function escapeRegExp(text) {
  return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function escapeHtml(t) {
  return t.replace(/&/g,"&amp;")
          .replace(/</g,"&lt;")
          .replace(/>/g,"&gt;");
}
</script>

</body>
</html>
